<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0B0B10">
<meta name="apple-mobile-web-app-title" content="M3U Player">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<title>M3U Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
:root {
  --bg:#0B0B10; --surface:#111118; --elevated:#1A1A24; --border:#22222E;
  --accent:#4F7FFF; --accent-dim:rgba(79,127,255,.15); --accent-glow:rgba(79,127,255,.4);
  --text:#E8E8F2; --text-dim:#8888A8; --muted:#44445A; --success:#3DEBA0;
  --warn:#F5A623; --danger:#FF5072; --gold:#F5C542;
  --hero-grad:linear-gradient(to bottom,transparent 0%,transparent 30%,rgba(11,11,16,.9) 70%,#0B0B10 100%);
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px); --safe-r:env(safe-area-inset-right,0px);
  --vh:100vh;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{height:var(--vh);background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',system-ui,sans-serif;
  overflow:hidden;position:fixed;width:100%;-webkit-font-smoothing:antialiased}
/* LOAD SCREEN */
#load-screen{display:flex;flex-direction:column;align-items:center;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:calc(20px + var(--safe-t)) calc(20px + var(--safe-r)) calc(20px + var(--safe-b)) calc(20px + var(--safe-l));
  gap:16px;background:var(--bg);height:var(--vh)}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-icon{width:42px;height:42px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px var(--accent-glow)}
.logo-icon svg{width:22px;height:22px;fill:white}
.logo-name{font-size:22px;font-weight:700;letter-spacing:-.5px}
.logo-sub{font-size:10px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.section-label{font-size:11px;color:var(--text-dim);font-weight:600;letter-spacing:1px;text-transform:uppercase;width:100%;max-width:440px}
.drop-zone{width:100%;max-width:440px;border:2px dashed var(--border);border-radius:14px;padding:28px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface);position:relative;overflow:hidden}
.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-dim)}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:16px}
.drop-icon{width:40px;height:40px;margin:0 auto 10px;opacity:.35}
.drop-icon svg{width:40px;height:40px;fill:var(--text)}
.drop-title{font-size:15px;font-weight:600;margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--text-dim)}
@media(hover:none){.drop-sub{display:none}}
.divider{display:flex;align-items:center;gap:12px;width:100%;max-width:440px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:11px;color:var(--text-dim)}
.url-row{display:flex;gap:8px;width:100%;max-width:440px}
.url-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:11px 14px;outline:none;transition:border .2s;-webkit-appearance:none}
.url-input::placeholder{color:var(--text-dim)}
.url-input:focus{border-color:var(--accent)}
.btn{padding:11px 18px;border-radius:10px;border:none;cursor:pointer;font-size:15px;font-weight:600;transition:all .15s;white-space:nowrap;-webkit-appearance:none}
.btn-primary{background:var(--accent);color:white}
.btn-primary:active{transform:scale(.96);opacity:.85}
.pl-list{width:100%;max-width:440px;display:flex;flex-direction:column;gap:8px}
.pl-item{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:border-color .15s;position:relative}
.pl-item:active{border-color:var(--accent)}
.pl-icon{width:36px;height:36px;border-radius:9px;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pl-icon svg{width:18px;height:18px;fill:var(--accent)}
.pl-info{flex:1;min-width:0}
.pl-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.pl-type{font-size:10px;color:var(--accent);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:3px}
.pl-del{width:34px;height:34px;border:none;background:none;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:8px;flex-shrink:0;touch-action:manipulation;padding:0}
.pl-del:active{background:rgba(255,80,114,.12);color:var(--danger)}
.pl-del svg{width:16px;height:16px;fill:currentColor}
/* BROWSE */
#browse-screen{display:none;flex-direction:column;height:var(--vh);background:var(--bg);position:absolute;inset:0}
#browse-screen.active{display:flex}
.browse-nav{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:10px;
  padding:calc(12px + var(--safe-t)) calc(14px + var(--safe-r)) 12px calc(14px + var(--safe-l));
  background:linear-gradient(to bottom,rgba(11,11,16,.95) 0%,transparent 100%);transition:background .3s}
.browse-nav.scrolled{background:rgba(11,11,16,.92);backdrop-filter:blur(12px)}
.browse-nav-logo{display:flex;align-items:center;gap:8px;flex:1}
.browse-nav-icon{width:28px;height:28px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.browse-nav-icon svg{width:14px;height:14px;fill:white}
.browse-nav-title{font-size:16px;font-weight:700}
.nav-btn{width:38px;height:38px;border-radius:10px;border:none;background:rgba(255,255,255,.08);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.nav-btn svg{width:20px;height:20px;fill:currentColor}
.nav-btn:active{background:rgba(255,255,255,.18)}
#browse-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
#browse-hero{position:relative;height:min(75vw,380px);overflow:hidden;flex-shrink:0}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center top;filter:brightness(0.45) saturate(1.3);transform:scale(1.04)}
.hero-overlay{position:absolute;inset:0;background:var(--hero-grad)}
.hero-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px;padding-top:calc(50px + var(--safe-t))}
.hero-logo-wrap{width:160px;height:110px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.hero-logo-wrap img{max-width:160px;max-height:110px;object-fit:contain;filter:drop-shadow(0 4px 24px rgba(0,0,0,.8))}
.hero-init{font-size:36px;font-weight:800;color:white;text-shadow:0 2px 16px rgba(0,0,0,.8)}
.hero-bottom{position:absolute;bottom:0;left:0;right:0;padding:12px calc(14px + var(--safe-l)) 14px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:17px;font-weight:700;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 6px rgba(0,0,0,.8)}
.hero-cat{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
.hero-btns{display:flex;gap:8px;flex-shrink:0}
.hero-play-btn{display:flex;align-items:center;gap:6px;padding:9px 16px;background:white;color:#0B0B10;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;touch-action:manipulation;white-space:nowrap}
.hero-play-btn svg{width:16px;height:16px;fill:currentColor}
.hero-play-btn:active{opacity:.8}
.hero-icon-btn{width:38px;height:38px;border-radius:8px;border:none;background:rgba(255,255,255,.15);color:white;backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation}
.hero-icon-btn svg{width:18px;height:18px;fill:currentColor}
.hero-icon-btn.faved{color:var(--gold)}
.hero-icon-btn:active{background:rgba(255,255,255,.28)}
#browse-rows{padding-bottom:calc(20px + var(--safe-b))}
.browse-row{margin-bottom:6px}
.row-header{display:flex;align-items:center;justify-content:space-between;padding:14px calc(14px + var(--safe-r)) 8px calc(14px + var(--safe-l))}
.row-title{font-size:15px;font-weight:700;color:var(--text)}
.row-more{font-size:13px;color:var(--accent);cursor:pointer;touch-action:manipulation;padding:2px 4px}
.row-more:active{opacity:.6}
.row-scroll{display:flex;gap:10px;overflow-x:auto;padding:0 calc(14px + var(--safe-l));padding-right:calc(14px + var(--safe-r));scrollbar-width:none;-webkit-overflow-scrolling:touch;scroll-snap-type:x mandatory}
.row-scroll::-webkit-scrollbar{display:none}
.b-card{flex-shrink:0;width:min(46vw,210px);background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;touch-action:manipulation;position:relative;scroll-snap-align:start;transition:border-color .15s,transform .1s}
.b-card:active{transform:scale(.96)}
.b-card.playing{border-color:var(--accent)}
.b-card-logo{aspect-ratio:16/9;background:var(--elevated);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.b-card-logo img{width:100%;height:100%;object-fit:contain;padding:10px}
.b-card-init{font-size:22px;font-weight:800;color:var(--text-dim)}
.b-card-play-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.b-card:active .b-card-play-ov{opacity:1}
.b-card-play-ov svg{width:28px;height:28px;fill:white;filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.b-card-playing-bar{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);display:none}
.b-card.playing .b-card-playing-bar{display:block}
.b-card-fav{position:absolute;top:7px;left:7px;width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 6px rgba(245,197,66,.6)}
.b-card-q{position:absolute;top:6px;right:6px;font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 5px;border-radius:4px}
.b-card-info{padding:7px 9px 9px}
.b-card-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.b-card-group{font-size:10px;color:var(--text-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.q-hd{background:rgba(79,127,255,.2);color:var(--accent)}
.q-fhd{background:rgba(79,127,255,.25);color:#6B9FFF}
.q-4k{background:rgba(245,166,35,.2);color:var(--warn)}
.q-sd{background:rgba(85,85,122,.2);color:var(--text-dim)}
/* SEARCH */
#search-overlay{display:none;position:fixed;inset:0;z-index:50;background:var(--bg);flex-direction:column}
#search-overlay.active{display:flex}
.search-bar{display:flex;align-items:center;gap:10px;padding:calc(14px + var(--safe-t)) calc(14px + var(--safe-r)) 10px calc(14px + var(--safe-l));background:var(--surface);border-bottom:1px solid var(--border)}
.search-input-wrap{flex:1;position:relative}
.search-ico-abs{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;line-height:0}
.search-ico-abs svg{width:16px;height:16px;fill:var(--text)}
.search-main-input{width:100%;background:var(--elevated);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;padding:10px 34px;outline:none;transition:border .2s;-webkit-appearance:none}
.search-main-input:focus{border-color:var(--accent)}
.search-clear-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim);padding:4px;line-height:0}
.search-clear-btn svg{width:14px;height:14px;fill:currentColor}
.search-cancel{background:none;border:none;color:var(--accent);font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;touch-action:manipulation}
#search-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.search-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(34,34,46,.5);cursor:pointer;min-height:60px;touch-action:manipulation}
.search-item:active{background:var(--elevated)}
.search-item-logo{width:42px;height:42px;border-radius:9px;background:var(--elevated);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.search-item-logo img{width:100%;height:100%;object-fit:contain}
.search-item-init{font-size:13px;font-weight:700;color:var(--text-dim)}
.search-item-info{flex:1;min-width:0}
.search-item-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.search-item-group{font-size:11px;color:var(--text-dim);margin-top:2px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:12px;color:var(--text-dim)}
.empty-state svg{width:44px;height:44px;fill:var(--text-dim);opacity:.3}
.empty-state p{font-size:14px}
/* CAT SCREEN */
#cat-screen{display:none;flex-direction:column;height:var(--vh);background:var(--bg);position:absolute;inset:0;z-index:20}
#cat-screen.active{display:flex}
.cat-topbar{display:flex;align-items:center;gap:10px;padding:calc(10px + var(--safe-t)) calc(14px + var(--safe-r)) 10px calc(14px + var(--safe-l));background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.cat-back{width:38px;height:38px;border-radius:9px;border:none;background:var(--elevated);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.cat-back svg{width:20px;height:20px;fill:currentColor}
.cat-back:active{background:var(--border)}
.cat-title-wrap{flex:1;min-width:0}
.cat-title{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-count{font-size:12px;color:var(--text-dim);margin-top:1px}
.cat-grid-btn{width:38px;height:38px;border-radius:9px;border:none;background:var(--elevated);color:var(--text-dim);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.cat-grid-btn.on{color:var(--accent);background:var(--accent-dim)}
.cat-grid-btn svg{width:20px;height:20px;fill:currentColor}
#cat-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:var(--safe-b)}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
@media(min-width:480px){.cat-grid{grid-template-columns:repeat(4,1fr)}}
@media(min-width:700px){.cat-grid{grid-template-columns:repeat(5,1fr)}}
.cat-list-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid rgba(34,34,46,.5);cursor:pointer;min-height:60px;touch-action:manipulation;transition:background .1s}
.cat-list-item:active{background:var(--elevated)}
.cat-list-item.playing{background:rgba(79,127,255,.08)}
.cat-list-logo{width:42px;height:42px;border-radius:9px;background:var(--elevated);border:1px solid var(--border);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.cat-list-logo img{width:100%;height:100%;object-fit:contain}
.cat-list-init{font-size:13px;font-weight:700;color:var(--text-dim)}
.cat-list-info{flex:1;min-width:0}
.cat-list-name{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.cat-list-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.cat-series-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin:6px 12px;cursor:pointer;transition:border-color .2s}
.cat-series-card.expanded{border-color:rgba(79,127,255,.5)}
.cat-series-banner{height:80px;background:var(--elevated);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.cat-series-bg{position:absolute;inset:-10px;width:calc(100% + 20px);height:calc(100% + 20px);filter:blur(16px);opacity:.4;object-fit:cover}
.cat-series-logo{position:relative;z-index:1;max-height:52px;max-width:140px;object-fit:contain}
.cat-series-init{position:relative;z-index:1;font-size:26px;font-weight:800;color:white;letter-spacing:-1px}
.cat-series-head{display:flex;align-items:center;gap:12px;padding:10px 14px;touch-action:manipulation}
.cat-series-name{font-size:14px;font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-series-badges{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.s-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;background:var(--accent-dim);color:var(--accent)}
.s-badge.ep{background:rgba(61,235,160,.1);color:var(--success)}
.cat-series-arr{color:var(--text-dim);flex-shrink:0;transition:transform .25s;line-height:0}
.cat-series-arr.open{transform:rotate(180deg)}
.cat-series-arr svg{width:20px;height:20px;fill:currentColor}
.cat-series-body{border-top:1px solid var(--border);display:none}
.cat-series-body.open{display:block}
.season-row{display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(11,11,16,.6);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;touch-action:manipulation}
.season-row-label{font-size:12px;font-weight:700}
.season-row-cnt{font-size:11px;color:var(--text-dim)}
.season-row-arr{margin-left:auto;color:var(--text-dim);transition:transform .2s;line-height:0}
.season-row-arr.open{transform:rotate(180deg)}
.season-row-arr svg{width:14px;height:14px;fill:currentColor}
.ep-list{display:none}
.ep-list.open{display:block}
.ep-row{display:flex;align-items:center;gap:10px;padding:10px 14px 10px 28px;border-bottom:1px solid rgba(34,34,46,.4);cursor:pointer;touch-action:manipulation;transition:background .1s}
.ep-row:active{background:var(--elevated)}
.ep-row.playing{background:rgba(79,127,255,.07)}
.ep-num{font-size:11px;font-weight:700;color:var(--accent);min-width:30px;flex-shrink:0}
.ep-title{font-size:13px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ep-play-btn{width:28px;height:28px;border-radius:7px;background:var(--accent-dim);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:var(--accent);padding:0;touch-action:manipulation}
.ep-play-btn svg{width:12px;height:12px;fill:currentColor;margin-left:1px}
.ep-play-btn:active{background:var(--accent);color:white}
/* PLAYER */
#player-screen{display:none;position:fixed;inset:0;background:#000;z-index:300;flex-direction:column}
#player-screen.active{display:flex}
#pv{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
#p-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.75) 0%,rgba(0,0,0,0) 28%,rgba(0,0,0,0) 72%,rgba(0,0,0,.85) 100%);display:flex;flex-direction:column;justify-content:space-between;transition:opacity .3s;padding-top:var(--safe-t);padding-bottom:calc(var(--safe-b) + 8px);padding-left:var(--safe-l);padding-right:var(--safe-r)}
#p-overlay.hidden{opacity:0;pointer-events:none}
#p-top{display:flex;align-items:center;gap:10px;padding:14px 16px 10px}
.p-back{width:38px;height:38px;border-radius:10px;border:none;background:rgba(255,255,255,.12);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;touch-action:manipulation;backdrop-filter:blur(4px)}
.p-back svg{width:20px;height:20px;fill:currentColor}
.p-back:active{background:rgba(255,255,255,.2)}
.p-title-wrap{flex:1;min-width:0}
.p-ch-name{font-size:15px;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.p-ch-group{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px}
.p-top-right{display:flex;gap:6px;flex-shrink:0}
.p-icon-btn{width:38px;height:38px;border-radius:10px;border:none;background:rgba(255,255,255,.12);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;backdrop-filter:blur(4px)}
.p-icon-btn svg{width:18px;height:18px;fill:currentColor}
.p-icon-btn:active{background:rgba(255,255,255,.22)}
.p-icon-btn.faved{color:var(--gold)}
#p-nav{display:flex;justify-content:space-between;align-items:center;padding:0 12px;pointer-events:none}
#p-nav button{width:48px;height:48px;border-radius:50%;border:none;background:rgba(0,0,0,.35);color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;pointer-events:all;backdrop-filter:blur(4px);transition:background .15s}
#p-nav button:active{background:rgba(0,0,0,.6)}
#p-nav button svg{width:24px;height:24px;fill:currentColor}
#p-bottom{display:flex;align-items:center;gap:12px;padding:10px 16px 14px}
.p-ctrl{width:42px;height:42px;border-radius:10px;border:none;background:none;color:white;display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.p-ctrl svg{width:24px;height:24px;fill:currentColor}
.p-ctrl:active{opacity:.6}
.p-pos{font-size:12px;color:rgba(255,255,255,.55);white-space:nowrap;flex-shrink:0}
.p-spacer{flex:1}
#p-loading{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;pointer-events:none}
#p-loading.show{display:flex}
@keyframes spin{to{transform:rotate(360deg)}}
.p-spinner{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.15);border-top-color:var(--accent);animation:spin .8s linear infinite}
.p-loading-name{font-size:13px;color:rgba(255,255,255,.5);max-width:260px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#p-error{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;pointer-events:none}
#p-error.show{display:flex}
#p-error>*{pointer-events:auto}
.p-err-icon{font-size:40px;line-height:1}
.p-err-title{font-size:16px;font-weight:600;color:var(--danger)}
.p-err-msg{font-size:13px;color:rgba(255,255,255,.55);text-align:center;max-width:300px;line-height:1.5;white-space:pre-line}
.p-err-btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:4px}
.p-err-btn{padding:10px 18px;border-radius:10px;border:1px solid var(--border);background:var(--elevated);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;touch-action:manipulation}
.p-err-btn.primary{background:var(--accent);border-color:var(--accent);color:white}
.p-err-btn:active{opacity:.75}
/* BOTTOM SHEET */
#bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:199;opacity:0;pointer-events:none;transition:opacity .3s}
#bs-overlay.show{opacity:1;pointer-events:all}
#bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--elevated);border-radius:16px 16px 0 0;border-top:1px solid var(--border);transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.2,.64,1);z-index:200;padding-bottom:var(--safe-b);padding-left:var(--safe-l);padding-right:var(--safe-r)}
#bottom-sheet.open{transform:translateY(0)}
.bs-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 6px}
.bs-head{display:flex;align-items:center;gap:12px;padding:6px 16px 12px;border-bottom:1px solid var(--border)}
.bs-logo{width:44px;height:44px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.bs-logo img{width:100%;height:100%;object-fit:contain}
.bs-logo-init{font-size:14px;font-weight:700;color:var(--text-dim)}
.bs-meta{flex:1;min-width:0}
.bs-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bs-group{font-size:12px;color:var(--text-dim);margin-top:2px}
.bs-url{padding:9px 16px;font-size:11px;color:var(--text-dim);word-break:break-all;line-height:1.5;border-bottom:1px solid var(--border);max-height:52px;overflow:hidden}
.bs-actions{display:flex;flex-direction:column;padding:6px 0}
.bs-action{display:flex;align-items:center;gap:14px;padding:14px 16px;cursor:pointer;border:none;background:none;color:var(--text);width:100%;text-align:left;font-size:15px;touch-action:manipulation;min-height:52px;transition:background .1s}
.bs-action:active{background:rgba(255,255,255,.06)}
.bs-action svg{width:20px;height:20px;fill:currentColor;opacity:.6;flex-shrink:0}
.bs-sep{height:1px;background:var(--border);margin:0 16px}
/* SERIES CARDS in row */
.s-card{flex-shrink:0;width:min(44vw,200px);background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;touch-action:manipulation;scroll-snap-align:start;transition:border-color .15s,transform .1s}
.s-card:active{transform:scale(.95);border-color:var(--accent)}
.s-card-banner{aspect-ratio:2/3;position:relative;overflow:hidden;background:var(--elevated);display:flex;align-items:center;justify-content:center}
.s-card-bg{position:absolute;inset:-4px;background-size:cover;background-position:center;filter:blur(4px) brightness(.55);transform:scale(1.08)}
.s-card-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.15) 0%,transparent 30%,rgba(11,11,16,.7) 75%,rgba(11,11,16,.95) 100%)}
.s-card-logo{position:relative;z-index:1;max-height:70px;max-width:85%;object-fit:contain;padding:8px;filter:drop-shadow(0 2px 12px rgba(0,0,0,.8))}
.s-card-init{position:relative;z-index:1;font-size:34px;font-weight:800;color:white;text-shadow:0 2px 16px rgba(0,0,0,.8)}
.s-card-eps-badge{position:absolute;top:7px;right:7px;z-index:2;font-size:9px;font-weight:700;background:var(--accent);color:white;padding:3px 7px;border-radius:5px;backdrop-filter:blur(4px)}
.s-card-info{padding:8px 10px 10px}
.s-card-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-card-meta{font-size:10px;color:var(--text-dim);margin-top:2px}
/* SERIES DETAIL SCREEN */
#series-screen{display:none;flex-direction:column;height:var(--vh);background:var(--bg);position:absolute;inset:0;z-index:25}
#series-screen.active{display:flex}
.ss-topbar{display:flex;align-items:center;gap:10px;padding:calc(10px + var(--safe-t)) calc(14px + var(--safe-r)) 10px calc(14px + var(--safe-l));background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.ss-back{width:38px;height:38px;border-radius:9px;border:none;background:var(--elevated);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;flex-shrink:0}
.ss-back svg{width:20px;height:20px;fill:currentColor}
.ss-back:active{background:var(--border)}
.ss-topbar-title{flex:1;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ss-banner{height:180px;position:relative;overflow:hidden;background:var(--elevated);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ss-banner-bg{position:absolute;inset:-20px;background-size:cover;background-position:center;filter:blur(24px) brightness(.35);transform:scale(1.1)}
.ss-banner-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 0%,rgba(11,11,16,.7) 80%,var(--bg) 100%)}
.ss-banner-logo{position:relative;z-index:1;max-height:90px;max-width:200px;object-fit:contain;filter:drop-shadow(0 4px 16px rgba(0,0,0,.7))}
.ss-banner-init{position:relative;z-index:1;font-size:52px;font-weight:800;color:white;text-shadow:0 2px 20px rgba(0,0,0,.8)}
.ss-meta-bar{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.ss-meta-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;background:var(--accent-dim);color:var(--accent)}
.ss-meta-badge.ep{background:rgba(61,235,160,.12);color:var(--success)}
#ss-content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:var(--safe-b)}
/* EPG on cards */
.b-card-prog{font-size:10px;color:var(--success);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.9}
.b-card-prog-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--success);border-radius:0 2px 0 0;transition:width .5s}
/* EPG in player */
#p-epg{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px}
/* EPG load section */
.epg-row{display:flex;gap:8px;width:100%;max-width:440px}
.epg-input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;padding:10px 14px;outline:none;transition:border .2s;-webkit-appearance:none}
.epg-input::placeholder{color:var(--text-dim)}
.epg-input:focus{border-color:var(--success)}
.btn-epg{padding:10px 14px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;white-space:nowrap;background:rgba(61,235,160,.15);color:var(--success)}
.btn-epg:active{opacity:.8}
.epg-status{font-size:11px;color:var(--text-dim);width:100%;max-width:440px;min-height:16px}
/* PiP button */
#p-pip-btn{display:none}
#p-pip-btn.show{display:flex}
/* TOAST */
#toast{position:fixed;bottom:calc(20px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(80px);background:var(--elevated);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:500;transition:transform .25s cubic-bezier(.34,1.56,.64,1);z-index:1000;white-space:nowrap;pointer-events:none;box-shadow:0 8px 30px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}
#toast.ok{color:var(--success);border-color:rgba(61,235,160,.3)}
#toast.info{color:var(--accent);border-color:rgba(79,127,255,.3)}
.progress{position:fixed;top:0;left:0;height:2px;background:var(--accent);box-shadow:0 0 8px var(--accent-glow);transition:width .3s ease;z-index:999}
</style>
</head>
<body>
<!-- LOAD SCREEN -->
<div id="load-screen">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg></div>
    <div><div class="logo-name">M3U Player</div><div class="logo-sub">IPTV Browser</div></div>
  </div>
  <div class="section-label" style="color:var(--success)">EPG (Program Rehberi)</div>
  <div class="epg-row">
    <input class="epg-input" id="epg-url-input" type="url" inputmode="url" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="https://…/epg.xml veya epg.xml.gz">
    <button class="btn-epg" id="epg-load-btn">Yükle</button>
  </div>
  <div class="epg-status" id="epg-status"></div>
  <div id="pl-list-wrap" style="display:none;width:100%;max-width:440px">

    <div class="pl-list" id="pl-list"></div>
  </div>

    <input type="file" id="file-input" accept=".m3u,.m3u8,.txt,text/plain">
    <div class="drop-icon"><svg viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4zm-4 2h14v2H5z"/></svg></div>
    <div class="drop-title">M3U dosyası seç</div>
    <div class="drop-sub">veya buraya sürükle bırak</div>
  </div>
  <div class="divider"><div class="divider-line"></div><div class="divider-text">veya URL yapıştır</div><div class="divider-line"></div></div>
  <div class="url-row">
    <input class="url-input" id="url-input" type="url" inputmode="url" autocomplete="url" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="https://…/playlist.m3u">
    <button class="btn btn-primary" id="url-load-btn">Yükle</button>
  </div>
</div>
<!-- BROWSE SCREEN -->
<div id="browse-screen">
  <nav class="browse-nav" id="browse-nav">
    <div class="browse-nav-logo">
      <div class="browse-nav-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg></div>
      <span class="browse-nav-title">M3U Player</span>
    </div>
    <button class="nav-btn" id="browse-search-btn"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
    <button class="nav-btn" id="browse-back-btn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
  </nav>
  <div id="browse-scroll">
    <div id="browse-hero">
      <div class="hero-bg" id="hero-bg"></div>
      <div class="hero-overlay"></div>
      <div class="hero-content" id="hero-content"></div>
      <div class="hero-bottom">
        <div class="hero-info"><div class="hero-name" id="hero-name"></div><div class="hero-cat" id="hero-cat"></div></div>
        <div class="hero-btns">
          <button class="hero-play-btn" id="hero-play-btn"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>İzle</button>
          <button class="hero-icon-btn" id="hero-fav-btn"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>
          <button class="hero-icon-btn" id="hero-info-btn"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg></button>
        </div>
      </div>
    </div>
    <div id="browse-rows"></div>
  </div>
</div>
<!-- SEARCH OVERLAY -->
<div id="search-overlay">
  <div class="search-bar">
    <div class="search-input-wrap">
      <span class="search-ico-abs"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
      <input class="search-main-input" id="search-main-input" type="search" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Kanal ara…">
      <button class="search-clear-btn" id="search-clear-btn" style="display:none"><svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg></button>
    </div>
    <button class="search-cancel" id="search-cancel-btn">İptal</button>
  </div>
  <div id="search-results"></div>
</div>
<!-- CATEGORY SCREEN -->
<div id="cat-screen">
  <div class="cat-topbar">
    <button class="cat-back" id="cat-back-btn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
    <div class="cat-title-wrap"><div class="cat-title" id="cat-title"></div><div class="cat-count" id="cat-count"></div></div>
    <button class="cat-grid-btn" id="cat-grid-btn"><svg id="cat-grid-ico" viewBox="0 0 24 24"><path d="M3 3h7v7H3zm0 11h7v7H3zm11-11h7v7h-7zm0 11h7v7h-7z"/></svg></button>
  </div>
  <div id="cat-content"></div>
</div>
<!-- SERIES DETAIL SCREEN -->

  <div class="ss-topbar">
    <button class="ss-back" id="ss-back-btn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
    <div class="ss-topbar-title" id="ss-title"></div>
  </div>
  <div class="ss-banner" id="ss-banner"></div>
  <div class="ss-meta-bar" id="ss-meta-bar"></div>
  <div id="ss-content"></div>
</div>

  <video id="pv" playsinline webkit-playsinline preload="none"></video>
  <div id="p-overlay">
    <div id="p-top">
      <button class="p-back" id="p-back-btn"><svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></button>
      <div class="p-title-wrap"><div class="p-ch-name" id="p-ch-name"></div><div class="p-ch-group" id="p-ch-group"></div><div id="p-epg"></div></div>
      <div class="p-top-right">
        <button class="p-icon-btn" id="p-fav-btn"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>
        <button class="p-icon-btn" id="p-info-btn"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg></button>
      </div>
    </div>

      <button id="p-next-btn"><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
    </div>
    <div id="p-bottom">
      <button class="p-ctrl" id="p-play-btn"><svg id="p-play-ico" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <span class="p-pos" id="p-pos"></span><div class="p-spacer"></div>
      <button class="p-ctrl" id="p-mute-btn"><svg id="p-mute-ico" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
      <button class="p-ctrl p-icon-btn" id="p-pip-btn" title="Picture in Picture"><svg viewBox="0 0 24 24"><path d="M19 7H9c-1.1 0-2 .9-2 2v6c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V9c0-1.1-.9-2-2-2zm0 8H9V9h10v6zM3 5v14h2V5H3zm4 0v2h12V5H7z"/></svg></button>
      <button class="p-ctrl" id="p-fs-btn"><svg id="p-fs-ico" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
    </div>
  </div>
  <div id="p-loading"><div class="p-spinner"></div><div class="p-loading-name" id="p-loading-name"></div></div>
  <div id="p-error">
    <div class="p-err-icon">⚠️</div>
    <div class="p-err-title">Yayın açılamadı</div>
    <div class="p-err-msg" id="p-err-msg"></div>
    <div class="p-err-btns">

      <button class="p-err-btn" id="p-err-vlc">VLC'de Aç</button>
      <button class="p-err-btn" id="p-err-copy">Link Kopyala</button>
      <button class="p-err-btn" id="p-err-ext">Başka Uygulama</button>
    </div>
  </div>
</div>
<!-- BOTTOM SHEET -->
<div id="bs-overlay"></div>
<div id="bottom-sheet">
  <div class="bs-handle"></div>
  <div class="bs-head"><div class="bs-logo" id="bs-logo"></div><div class="bs-meta"><div class="bs-title" id="bs-title"></div><div class="bs-group" id="bs-group"></div></div></div>
  <div class="bs-url" id="bs-url"></div>
  <div class="bs-actions">
    <button class="bs-action" id="bs-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Oynat</button>
    <div class="bs-sep"></div>

// VH
function setVH(){const h=window.visualViewport?window.visualViewport.height:window.innerHeight;document.documentElement.style.setProperty('--vh',h+'px');}
setVH();

else window.addEventListener('resize',setVH);

// Storage
const S={_p:'m3u_',get(k,d){try{const v=localStorage.getItem(this._p+k);return v!=null?JSON.parse(v):d}catch{return d}},set(k,v){try{localStorage.setItem(this._p+k,JSON.stringify(v))}catch(e){if(e.name==='QuotaExceededError')try{localStorage.removeItem(this._p+'chs')}catch{}}},del(k){try{localStorage.removeItem(this._p+k)}catch{}}};
// State
let ALL=[],FAVS=new Set(S.get('favs',[])),RECENT=S.get('recent',[]),GRID_MODE=S.get('grid',false);

// Helpers
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ago(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return 'az önce';if(s<3600)return Math.floor(s/60)+' dk önce';if(s<86400)return Math.floor(s/3600)+' saat önce';return Math.floor(s/86400)+' gün önce';}
function numFmt(n){return Number(n).toLocaleString('tr')}
function dq(n){if(/\b(4K|UHD)\b/i.test(n))return '4K';if(/\bFHD\b/i.test(n)||/FULLHD/i.test(n))return 'FHD';if(/\bHD\b/i.test(n))return 'HD';if(/\bSD\b/i.test(n))return 'SD';return null;}
function qb(q,c){if(!q)return '';const k=c||'b-card-q';const qc=q==='4K'?'q-4k':q==='FHD'?'q-fhd':q==='HD'?'q-hd':'q-sd';return '<span class="'+k+' '+qc+'">'+q+'</span>';}
function chi(n){return n.replace(/[^A-Za-z0-9ÇĞİÖŞÜçğışöşü]/g,'').slice(0,2).toUpperCase()||'??';}

// M3U Parser
function parseM3U(text){
  const lines=text.split('\n'),chs=[];
  for(let i=0;i<lines.length;i++){
    const line=lines[i].trim();
    if(line.startsWith('#EXTINF')){
      const url=(lines[i+1]||'').trim();
      if(url&&!url.startsWith('#')&&url.length>6){
        const gM=line.match(/group-title="([^"]*)"/i),nM=line.match(/,(.+)$/),lM=line.match(/tvg-logo="([^"]*)"/i),tidM=line.match(/tvg-id="([^"]*)"/i);
        chs.push({id:chs.length,n:nM?nM[1].trim():'Kanal '+(chs.length+1),g:(gM?gM[1].trim():'')||'Genel',l:lM?lM[1].trim():'',u:url,tid:tidM?tidM[1].trim():''});i++;
      }
    }
  }
  return chs;
}
// Series
function detectSeries(name){
  let m;
  // S01E01 / S01 E01 / S01EP01 / S01 EP01 (space between S and E allowed)
  m=name.match(/^(.+?)\s+[Ss](\d{1,2})\s*[Ee][Pp]?(\d{1,3})(?:\s*[-–:]\s*(.+))?$/);
  if(m)return{show:m[1].trim(),s:+m[2],e:+m[3],t:m[4]?.trim()||null};
  // 1x01 format
  m=name.match(/^(.+?)\s+(\d{1,2})[Xx](\d{1,3})(?:\s*[-–:]\s*(.+))?$/);
  if(m)return{show:m[1].trim(),s:+m[2],e:+m[3],t:m[4]?.trim()||null};
  // Turkish: "Dizi Sezon 1 Bölüm 2"
  m=name.match(/^(.+?)\s+[Ss]ezon\s*(\d{1,2})\s+[Bb][öo]l[üu]m\s*(\d{1,3})(?:\s*[-–:]\s*(.+))?$/i);
  if(m)return{show:m[1].trim(),s:+m[2],e:+m[3],t:m[4]?.trim()||null};
  // Turkish: "Dizi - Sezon 1 Bölüm 2"
  m=name.match(/^(.+?)\s*[-–]\s*[Ss]ezon\s*(\d{1,2})\s+[Bb][öo]l[üu]m\s*(\d{1,3})(?:\s*[-–:]\s*(.+))?$/i);
  if(m)return{show:m[1].trim(),s:+m[2],e:+m[3],t:m[4]?.trim()||null};
  // Turkish short: "Dizi S1 B2"
  m=name.match(/^(.+?)\s+[Ss](\d{1,2})\s*[Bb](\d{1,3})(?:\s*[-–:]\s*(.+))?$/);
  if(m)return{show:m[1].trim(),s:+m[2],e:+m[3],t:m[4]?.trim()||null};
  // Turkish: "Dizi | 47. Bölüm" or "Dizi | Bölüm 47"
  m=name.match(/^(.+?)\s*\|\s*(\d{1,3})\.\s*[Bb][öo]l[üu]m(?:\s*[-–:]\s*(.+))?$/i);
  if(m)return{show:m[1].trim(),s:1,e:+m[2],t:m[3]?.trim()||null};
  m=name.match(/^(.+?)\s*\|\s*[Bb][öo]l[üu]m\s*(\d{1,3})(?:\s*[-–:]\s*(.+))?$/i);
  if(m)return{show:m[1].trim(),s:1,e:+m[2],t:m[3]?.trim()||null};
  // Turkish standalone: "Dizi 47. Bölüm" or "Dizi Bölüm 47"
  m=name.match(/^(.+?)\s+(\d{1,3})\.\s*[Bb][öo]l[üu]m(?:\s*[-–:]\s*(.+))?$/i);
  if(m)return{show:m[1].trim(),s:1,e:+m[2],t:m[3]?.trim()||null};
  m=name.match(/^(.+?)\s+[Bb][öo]l[üu]m\s*(\d{1,3})(?:\s*[-–:]\s*(.+))?$/i);
  if(m)return{show:m[1].trim(),s:1,e:+m[2],t:m[3]?.trim()||null};
  return null;
}
function groupBySeries(channels){
  const map={},rest=[];
  channels.forEach(ch=>{
    const info=detectSeries(ch.n);
    if(info){const key=info.show.toLowerCase().replace(/\W+/g,'');
      if(!map[key])map[key]={name:info.show,logo:ch.l||'',seasons:{},key};
      if(!map[key].logo&&ch.l)map[key].logo=ch.l;
      (map[key].seasons[info.s]=map[key].seasons[info.s]||[]).push({...ch,_s:info.s,_e:info.e,_t:info.t});
    } else rest.push(ch);
  });
  const shows=Object.values(map).filter(s=>Object.values(s.seasons).flat().length>=2);
  if(!shows.length)return null;
  shows.forEach(s=>{Object.values(s.seasons).forEach(eps=>eps.sort((a,b)=>a._e-b._e));s.epCount=Object.values(s.seasons).flat().length;s.sCount=Object.keys(s.seasons).length;});
  shows.sort((a,b)=>a.name.localeCompare(b.name,'tr'));
  return{shows,rest};
}
// Playlist Manager
function autoSavePL(source,channels){
  if(!source)return;
  const existing=PLAYLISTS.find(p=>(source.type==='url'&&p.url===source.url)||(source.type==='file'&&p.name===source.name));
  const data=channels.map(c=>({n:c.n,g:c.g,l:c.l,u:c.u}));
  if(existing){existing.ts=Date.now();existing.count=channels.length;try{S.set('pl_'+existing.id,data);}catch{}}
  else{
    const id=Date.now().toString(36)+Math.random().toString(36).slice(2,5);
    let name=source.name||'Playlist';if(source.type==='url')try{name=new URL(source.url).hostname;}catch{}
    PLAYLISTS.unshift({id,name,type:source.type,url:source.url||null,ts:Date.now(),count:channels.length});
    if(PLAYLISTS.length>10){const old=PLAYLISTS.pop();S.del('pl_'+old.id);}
    try{S.set('pl_'+id,data);}catch{}
  }
  S.set('pl_list',PLAYLISTS);renderPLList();
}
function loadPL(id){
  const pl=PLAYLISTS.find(p=>p.id===id);if(!pl)return;
  const chs=S.get('pl_'+id,null);
  if(!chs||!chs.length){if(pl.type==='url'&&pl.url){loadURL(pl.url);return;}showToast('Playlist verisi bulunamadı','info');return;}
  setP(50);setTimeout(()=>initApp(chs.map((c,i)=>({id:i,...c})),{type:pl.type,name:pl.name,url:pl.url,ts:pl.ts}),60);
}
function deletePL(id,e){e.stopPropagation();PLAYLISTS=PLAYLISTS.filter(p=>p.id!==id);S.set('pl_list',PLAYLISTS);S.del('pl_'+id);renderPLList();showToast('Playlist silindi','info');}
function renamePL(id,e){e.stopPropagation();const pl=PLAYLISTS.find(p=>p.id===id);if(!pl)return;const name=prompt('Playlist adı:',pl.name);if(name&&name.trim()){pl.name=name.trim();S.set('pl_list',PLAYLISTS);renderPLList();}}
function renderPLList(){
  const wrap=document.getElementById('pl-list-wrap'),list=document.getElementById('pl-list');if(!wrap||!list)return;
  if(!PLAYLISTS.length){wrap.style.display='none';return;}
  wrap.style.display='';
  list.innerHTML=PLAYLISTS.map(pl=>'<div class="pl-item" data-pl-id="'+esc(pl.id)+'"><div class="pl-icon"><svg viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg></div><div class="pl-info"><div class="pl-name">'+esc(pl.name)+'</div><div class="pl-meta">'+numFmt(pl.count||0)+' kanal · '+ago(pl.ts)+'</div><div class="pl-type">'+(pl.type==='url'?'URL':'Dosya')+'</div></div><button class="pl-del" data-del-id="'+esc(pl.id)+'"><svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button></div>').join('');
  list.querySelectorAll('.pl-item').forEach(el=>{el.addEventListener('click',()=>loadPL(el.dataset.plId));el.addEventListener('dblclick',e=>renamePL(el.dataset.plId,e));el.querySelector('.pl-del').addEventListener('click',e=>deletePL(el.dataset.delId,e));});
}
// EPG
function parseXMLTVDate(s){
  const m=s.match(/^(\d{4})(\d{2})(\d{2})(\d{2})(\d{2})(\d{2})\s*([+-]\d{2}:?\d{2})?/);
  if(!m)return null;
  const[,yr,mo,dy,hh,mm,ss,tz]=m;
  let off=0;
  if(tz){const sign=tz[0]==='-'?-1:1;const tp=tz.replace(':','').slice(1);off=sign*(parseInt(tp.slice(0,2))*60+parseInt(tp.slice(2,4)))*60000;}
  return new Date(Date.UTC(+yr,+mo-1,+dy,+hh,+mm,+ss)-off).getTime();
}
function parseXMLTV(xml){
  const map={};
  const progRe=/<programme([^>]*)>([\s\S]*?)<\/programme>/gi;
  let pm;
  while((pm=progRe.exec(xml))!==null){
    const attrs=pm[1],body=pm[2];
    const sM=attrs.match(/start="([^"]+)"/),eM=attrs.match(/stop="([^"]+)"/),cM=attrs.match(/channel="([^"]+)"/);
    const tM=body.match(/<title[^>]*>([^<]+)<\/title>/i);
    if(!sM||!eM||!cM||!tM)continue;
    const s=parseXMLTVDate(sM[1]),e=parseXMLTVDate(eM[1]);
    if(!s||!e)continue;
    const ch=cM[1];
    if(!map[ch])map[ch]=[];
    map[ch].push({s,e,t:tM[1].replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').trim()});
  }
  return map;
}
function getEPGNow(ch){
  if(!ch||!Object.keys(EPG).length)return null;
  const now=Date.now();
  for(const id of[ch.tid,ch.n]){
    if(!id)continue;
    const progs=EPG[id];
    if(!progs)continue;
    const cur=progs.find(p=>p.s<=now&&p.e>now);
    if(cur)return cur;
  }
  return null;
}
async function loadEPG(url){
  const status=document.getElementById('epg-status');
  if(!url){EPG={};status.textContent='';return;}
  S.set('epg_url',url);
  status.textContent='EPG yükleniyor…';status.style.color='var(--text-dim)';
  try{
    const proxies=[url,'https://corsproxy.io/?'+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url)];
    let xml=null;
    for(const p of proxies){
      try{const res=await fetch(p,{signal:AbortSignal.timeout?AbortSignal.timeout(15000):undefined});if(res.ok){xml=await res.text();break;}}catch{}
    }
    if(!xml)throw new Error('Bağlanamadı');
    EPG=parseXMLTV(xml);
    const count=Object.keys(EPG).length;
    if(!count)throw new Error('Program verisi bulunamadı');
    status.textContent='✓ '+count+' kanal EPG yüklendi';status.style.color='var(--success)';
  }catch(e){status.textContent='EPG yüklenemedi: '+e.message;status.style.color='var(--danger)';}
}
function updatePlayerEPG(){
  const el=document.getElementById('p-epg');if(!el||!SEL)return;

// Browse
function renderHero(ch){
  if(!ch)return;HERO_CH=ch;
  const init=chi(ch.n),bg=document.getElementById('hero-bg'),content=document.getElementById('hero-content');
  if(ch.l){bg.style.backgroundImage='url('+esc(ch.l)+')';content.innerHTML='<div class="hero-logo-wrap"><img src="'+esc(ch.l)+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'block\'" alt=""><span class="hero-init" style="display:none">'+esc(init)+'</span></div>';}
  else{bg.style.backgroundImage='none';content.innerHTML='<div class="hero-logo-wrap"><span class="hero-init">'+esc(init)+'</span></div>';}
  document.getElementById('hero-name').textContent=ch.n;
  document.getElementById('hero-cat').textContent=ch.g;
  document.getElementById('hero-fav-btn').classList.toggle('faved',FAVS.has(ch.u));
}
function renderBCard(ch){
  const init=chi(ch.n),q=dq(ch.n);
  const isPlaying=SEL&&SEL.u===ch.u&&document.getElementById('player-screen').classList.contains('active');
  const logo=ch.l?'<img src="'+esc(ch.l)+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" loading="lazy"><span class="b-card-init" style="display:none">'+esc(init)+'</span>':'<span class="b-card-init">'+esc(init)+'</span>';
  const epg=getEPGNow(ch);
  const progHtml=epg?'<div class="b-card-prog">▶ '+esc(epg.t)+'</div>':'';
  return '<div class="b-card'+(isPlaying?' playing':'')+'" data-id="'+ch.id+'"><div class="b-card-logo">'+logo+(FAVS.has(ch.u)?'<span class="b-card-fav"></span>':'')+qb(q)+'<div class="b-card-play-ov"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>'+(isPlaying?'<div class="b-card-playing-bar"></div>':'')+'</div><div class="b-card-info"><div class="b-card-name">'+esc(ch.n)+'</div><div class="b-card-group">'+esc(ch.g)+'</div>'+progHtml+'</div></div>';
}
function createRow(title,channels,catKey){
  const div=document.createElement('div');div.className='browse-row';
  const more=catKey?'<span class="row-more" data-cat="'+esc(catKey)+'">Tümü ›</span>':'';
  div.innerHTML='<div class="row-header"><span class="row-title">'+esc(title)+'</span>'+more+'</div><div class="row-scroll">'+channels.map(ch=>renderBCard(ch)).join('')+'</div>';
  div.querySelectorAll('.b-card').forEach(el=>{const ch=ALL[parseInt(el.dataset.id)];if(!ch)return;el.addEventListener('click',()=>{PLAY_LIST=channels;openPlayer(ch,channels.indexOf(ch));});});
  div.querySelector('.row-more')?.addEventListener('click',e=>openCatScreen(e.target.dataset.cat));
  return div;
}
function renderBrowse(){
  const heroCh=RECENT.length>0?(ALL.find(c=>c.u===RECENT[0].u)||ALL[0]):ALL[0];
  if(heroCh)renderHero(heroCh);
  const rows=document.getElementById('browse-rows');rows.innerHTML='';
  if(FAVS.size>0){const fc=ALL.filter(c=>FAVS.has(c.u)).slice(0,20);if(fc.length)rows.appendChild(createRow('Favorilerim',fc,'⭐ Favoriler'));}
  if(RECENT.length>0){const rc=RECENT.slice(0,15).map(r=>ALL.find(c=>c.u===r.u)).filter(Boolean);if(rc.length)rows.appendChild(createRow('Son İzlenenler',rc,null));}
  const catMap={};ALL.forEach(ch=>{(catMap[ch.g]=catMap[ch.g]||[]).push(ch);});
  Object.entries(catMap).sort(([,a],[,b])=>b.length-a.length).forEach(([cat,chs])=>{
    // Try series grouping for this category
    const sg=groupBySeries(chs);
    if(sg&&sg.shows.length>=1){
      rows.appendChild(createSeriesRow(cat,sg.shows,chs,cat));
      if(sg.rest.length>0)rows.appendChild(createRow(cat+' · Kanallar',sg.rest.slice(0,20),cat));
    } else {
      rows.appendChild(createRow(cat,chs.slice(0,20),cat));
    }
  });
}
function createSeriesRow(title,shows,allChs,catKey){
  const div=document.createElement('div');div.className='browse-row';
  div.innerHTML='<div class="row-header"><span class="row-title">'+esc(title)+'</span><span class="row-more" data-cat="'+esc(catKey)+'">Tümü ›</span></div>'
    +'<div class="row-scroll">'+shows.slice(0,20).map(sv=>renderSCard(sv)).join('')+'</div>';
  div.querySelectorAll('.s-card').forEach(el=>{
    const key=el.dataset.svKey;
    const sv=shows.find(s=>s.key===key);
    if(!sv)return;
    el.addEventListener('click',()=>openSeriesScreen(sv,allChs,catKey));
  });
  div.querySelector('.row-more')?.addEventListener('click',e=>openCatScreen(e.target.dataset.cat));
  return div;
}
function renderSCard(sv){
  const bg=sv.logo?'<div class="s-card-bg" style="background-image:url('+esc(sv.logo)+')"></div><div class="s-card-grad"></div><img class="s-card-logo" src="'+esc(sv.logo)+'" loading="lazy" onerror="this.style.display=\'none\'">':'<div class="s-card-grad"></div><span class="s-card-init">'+esc(sv.name.slice(0,2).toUpperCase())+'</span>';
  return '<div class="s-card" data-sv-key="'+esc(sv.key)+'"><div class="s-card-banner">'+bg+'<span class="s-card-eps-badge">'+sv.epCount+' bölüm</span></div><div class="s-card-info"><div class="s-card-name">'+esc(sv.name)+'</div><div class="s-card-meta">'+sv.sCount+' sezon</div></div></div>';
}

let sdt=null;
function openSearch(){document.getElementById('search-overlay').classList.add('active');setTimeout(()=>document.getElementById('search-main-input').focus(),100);}
function closeSearch(){document.getElementById('search-overlay').classList.remove('active');document.getElementById('search-main-input').value='';document.getElementById('search-results').innerHTML='';document.getElementById('search-clear-btn').style.display='none';}

function renderSearch(q){
  const el=document.getElementById('search-results');if(!q){el.innerHTML='';return;}

// Player
function openPlayer(ch,idx){SEL=ch;PLAY_IDX=idx;document.getElementById('player-screen').classList.add('active');if(navigator.wakeLock)navigator.wakeLock.request('screen').then(wl=>{wakeLock=wl;}).catch(()=>{});playChannel(ch);showOverlay();}
function closePlayer(){const v=document.getElementById('pv');v.pause();if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}v.src='';if(wakeLock){wakeLock.release();wakeLock=null;}if(document.fullscreenElement||document.webkitFullscreenElement)(document.exitFullscreen||document.webkitExitFullscreen||function(){}).call(document);document.getElementById('player-screen').classList.remove('active');clearTimeout(overlayTimer);}
function playChannel(ch){
  const video=document.getElementById('pv');
  document.getElementById('p-ch-name').textContent=ch.n;document.getElementById('p-ch-group').textContent=ch.g;
  updatePlayerEPG();updatePFavBtn();updatePosLabel();showPlayerLoading(true,ch.n);hidePlayerError();addRecent(ch);
  if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}video.src='';
  const origUrl=ch.u,isHTTP=origUrl.startsWith('http://'),isHTTPS=location.protocol==='https:';
  let url=isHTTPS&&isHTTP?'https://'+origUrl.slice(7):origUrl;
  function tryHLS(src){
    if(typeof Hls!=='undefined'&&Hls.isSupported()){
      hlsInstance=new Hls({enableWorker:true,lowLatencyMode:true,maxBufferLength:30,maxMaxBufferLength:60,fragLoadingTimeOut:12000,manifestLoadingTimeOut:12000,xhrSetup:(xhr)=>{xhr.timeout=15000;}});
      hlsInstance.loadSource(src);hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{showPlayerLoading(false);video.play().catch(e=>showPlayerError('Oynatma başlatılamadı: '+e.message));});
      hlsInstance.on(Hls.Events.ERROR,(evt,data)=>{
        if(!data.fatal)return;
        if(data.type===Hls.ErrorTypes.NETWORK_ERROR){
          if(isHTTP&&isHTTPS)showPlayerError('Bu yayın HTTP protokolü kullanıyor ancak sayfa HTTPS üzerinden yüklendi.\nTarayıcı güvenlik politikası engelledi.\n\nVLC veya başka bir uygulama ile açabilirsiniz.');
          else showPlayerError('Ağ hatası: Yayına ulaşılamadı.\nURL geçersiz veya sunucu yanıt vermiyor.');
        } else if(data.type===Hls.ErrorTypes.MEDIA_ERROR)hlsInstance.recoverMediaError();
        else tryNative(src);
      });
    } else if(video.canPlayType('application/vnd.apple.mpegurl'))tryNative(src);
    else tryNative(src);
  }
  function tryNative(src,tried){
    if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
    video.src=src;video.load();
    video.play().then(()=>showPlayerLoading(false)).catch(e=>{
      // On iOS Safari, Xtream Codes URLs need .m3u8 suffix for native HLS
      const hasMediaExt=/\.(m3u8|mp4|ts|mkv|avi|flv)(\?|$)/i.test(src);
      if(isIOS&&!hasMediaExt&&!tried){
        const m3u8=src.split('?')[0]+'.m3u8'+(src.includes('?')?'?'+src.split('?').slice(1).join('?'):'');
        tryNative(m3u8,true);return;
      }
      if(isHTTP&&isHTTPS)showPlayerError('Bu yayın HTTP protokolü kullanıyor.\nHTTPS sayfasında oynatılamaz.\nVLC veya başka uygulama kullanın.');
      else showPlayerError('Oynatılamadı: '+e.message);
    });
  }
  tryHLS(url);
}

  else{FAVS.add(ch.u);if(btn)btn.classList.add('faved');showToast('Favorilere eklendi','ok');}
  S.set('favs',[...FAVS]);
  const lbl=document.getElementById('bs-fav-label');if(lbl)lbl.textContent=FAVS.has(ch.u)?'Favorilerden Kaldır':'Favorilere Ekle';
  if(SEL&&SEL.u===ch.u)updatePFavBtn();
  if(HERO_CH&&HERO_CH.u===ch.u)document.getElementById('hero-fav-btn').classList.toggle('faved',FAVS.has(ch.u));
}
function addRecent(ch){RECENT=RECENT.filter(r=>r.u!==ch.u);RECENT.unshift({n:ch.n,g:ch.g,l:ch.l,u:ch.u,ts:Date.now()});if(RECENT.length>20)RECENT.pop();S.set('recent',RECENT);}
function copyLink(ch){const text=ch.u;if(navigator.clipboard?.writeText)navigator.clipboard.writeText(text).then(()=>showToast('Link kopyalandı','ok')).catch(()=>fbCopy(text));else fbCopy(text);}
function fbCopy(text){const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;font-size:16px;';document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,99999);try{document.execCommand('copy');showToast('Link kopyalandı','ok');}catch{showToast('Kopyalanamadı','info');}document.body.removeChild(ta);}
function openVLC(ch){const url=isIOS?'vlc-x-callback://x-callback-url/stream?url='+encodeURIComponent(ch.u):'vlc://'+ch.u;const a=document.createElement('a');a.href=url;a.style.display='none';document.body.appendChild(a);a.click();document.body.removeChild(a);showToast('VLC açılıyor…','info');}
function exportFavs(){const fcs=ALL.filter(c=>FAVS.has(c.u));if(!fcs.length){showToast('Hiç favori kanal yok','info');return;}let m3u='#EXTM3U\n';fcs.forEach(ch=>{m3u+='#EXTINF:-1'+(ch.l?' tvg-logo="'+ch.l+'"':'')+' group-title="'+ch.g+'",'+ch.n+'\n'+ch.u+'\n';});const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([m3u],{type:'audio/x-mpegurl'}));a.download='favoriler.m3u';document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);document.body.removeChild(a);},1000);showToast(fcs.length+' kanal indirildi','ok');}
// Bottom Sheet
function openSheet(ch){
  SEL=ch;const init=chi(ch.n),logoEl=document.getElementById('bs-logo');
  logoEl.innerHTML=ch.l?'<img src="'+esc(ch.l)+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'" style="width:100%;height:100%;object-fit:contain"><span class="bs-logo-init" style="display:none">'+esc(init)+'</span>':'<span class="bs-logo-init">'+esc(init)+'</span>';
  document.getElementById('bs-title').textContent=ch.n;document.getElementById('bs-group').textContent=ch.g;document.getElementById('bs-url').textContent=ch.u;
  const faved=FAVS.has(ch.u);document.getElementById('bs-fav-label').textContent=faved?'Favorilerden Kaldır':'Favorilere Ekle';document.getElementById('bs-fav').querySelector('svg').style.fill=faved?'#F5C542':'currentColor';
  document.getElementById('bottom-sheet').classList.add('open');document.getElementById('bs-overlay').classList.add('show');
}
function closeSheet(){document.getElementById('bottom-sheet').classList.remove('open');document.getElementById('bs-overlay').classList.remove('show');}
let bsY=0;
document.getElementById('bottom-sheet').addEventListener('touchstart',e=>{bsY=e.touches[0].clientY;},{passive:true});
document.getElementById('bottom-sheet').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-bsY>60)closeSheet();},{passive:true});
document.getElementById('bs-overlay').addEventListener('click',closeSheet);
document.getElementById('bs-play').addEventListener('click',()=>{if(SEL){const idx=PLAY_LIST.findIndex(f=>f.u===SEL.u);closeSheet();openPlayer(SEL,idx>=0?idx:0);}});
document.getElementById('bs-fav').addEventListener('click',()=>{if(SEL){toggleFav(SEL);closeSheet();}});
document.getElementById('bs-copy').addEventListener('click',()=>{if(SEL){copyLink(SEL);closeSheet();}});
document.getElementById('bs-vlc').addEventListener('click',()=>{if(SEL){addRecent(SEL);openVLC(SEL);closeSheet();}});
document.getElementById('bs-ext').addEventListener('click',()=>{if(SEL){window.open(SEL.u,'_blank');closeSheet();}});
// PiP
const pipBtn=document.getElementById('p-pip-btn');
if(document.pictureInPictureEnabled)pipBtn.classList.add('show');
pipBtn.addEventListener('click',()=>{
  if(document.pictureInPictureElement)document.exitPictureInPicture().catch(()=>{});
  else pvEl.requestPictureInPicture().catch(()=>{});
  showOverlay();
});
pvEl.addEventListener('leavepictureinpicture',()=>showOverlay());
// EPG controls
document.getElementById('epg-load-btn').addEventListener('click',()=>loadEPG(document.getElementById('epg-url-input').value.trim()));
document.getElementById('epg-url-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.target.blur();loadEPG(e.target.value.trim());}});
// Init
function initApp(channels,source){
  ALL=channels;PLAY_LIST=ALL;
  if(source){S.set('src',source);autoSavePL(source,ALL);}
  try{S.set('chs',ALL.map(c=>({n:c.n,g:c.g,l:c.l,u:c.u})));}catch{}
  document.getElementById('load-screen').style.display='none';
  document.getElementById('browse-screen').classList.add('active');
  RECENT=S.get('recent',[]);
  renderBrowse();setP(100);
}
function loadText(text,source){setP(35);setTimeout(()=>{const chs=parseM3U(text);setP(80);if(!chs.length){showToast('M3U içinde kanal bulunamadı','info');setP(0);return;}setTimeout(()=>initApp(chs,source),60);},40);}
async function loadURL(url){
  url=url.trim();if(!url.startsWith('http')){showToast('Geçerli bir URL girin','info');return;}setP(15);
  const proxies=['https://corsproxy.io/?'+encodeURIComponent(url),'https://api.allorigins.win/raw?url='+encodeURIComponent(url)];
  for(const proxy of proxies){try{const res=await fetch(proxy,{signal:AbortSignal.timeout?AbortSignal.timeout(12000):undefined});if(res.ok){setP(65);loadText(await res.text(),{type:'url',url,name:url.split('/').pop()||url,ts:Date.now()});return;}}catch{}}
  setP(0);showToast('URL yüklenemedi','info');
}
// File/Drop
const dropZone=document.getElementById('drop-zone');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)readFile(f);});
document.getElementById('file-input').addEventListener('change',e=>{const f=e.target.files[0];if(f)readFile(f);e.target.value='';});
function readFile(f){setP(20);const r=new FileReader();r.onload=e=>loadText(e.target.result,{type:'file',name:f.name,ts:Date.now()});r.onerror=()=>showToast('Dosya okunamadı','info');r.readAsText(f,'utf-8');}
const urlInput=document.getElementById('url-input');
document.getElementById('url-load-btn').addEventListener('click',()=>loadURL(urlInput.value));
urlInput.addEventListener('keydown',e=>{if(e.key==='Enter'){urlInput.blur();loadURL(urlInput.value);}});
// PWA
if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
// Start
renderPLList();
const savedEpgUrl=S.get('epg_url','');
if(savedEpgUrl){document.getElementById('epg-url-input').value=savedEpgUrl;loadEPG(savedEpgUrl);}
</script>
</body>
</html>
