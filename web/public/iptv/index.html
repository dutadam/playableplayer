<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M3U Player</title>
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0B0B10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="../apple-touch-icon.png">
<style>
:root{
  --bg:#0B0B10;--surface:#111118;--elevated:#1A1A24;
  --accent:#4F7FFF;--accent2:#7B5EA7;
  --text:#E8E8F2;--text-dim:#8888A8;--text-muted:#555570;
  --danger:#FF4F4F;--ok:#4FD18B;--warn:#F5C542;
  --card-w:42vw;--card-h:calc(var(--card-w)*9/16);
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;overscroll-behavior:none}
button{background:none;border:none;cursor:pointer;color:inherit;font:inherit}
input{outline:none;border:none;background:none;color:inherit;font:inherit}
img{display:block}
svg{fill:currentColor;flex-shrink:0}

#progress{position:fixed;top:0;left:0;height:2px;width:0;background:var(--accent);z-index:9999;transition:width .3s,opacity .5s}
#toast{position:fixed;bottom:calc(60px + var(--safe-bot));left:50%;transform:translateX(-50%) translateY(20px);background:var(--elevated);color:var(--text);padding:10px 18px;border-radius:24px;font-size:13px;white-space:nowrap;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;z-index:9000;border:1px solid rgba(255,255,255,.08)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--ok);color:var(--ok)}
#toast.err{border-color:var(--danger);color:var(--danger)}

/* ── LOAD SCREEN ── */
#load-screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);z-index:100;overflow-y:auto;padding:calc(24px + var(--safe-top)) 16px calc(24px + var(--safe-bot))}
#load-screen.hidden{display:none}
.load-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.load-logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center}
.load-logo-icon svg{width:22px;height:22px;fill:#fff}
.load-logo-text{font-size:20px;font-weight:700;letter-spacing:-.3px}
.load-logo-text span{color:var(--accent)}
.drop-zone{border:1.5px dashed var(--text-muted);border-radius:16px;padding:32px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:16px}
.drop-zone.drag-over{border-color:var(--accent);background:rgba(79,127,255,.08)}
.drop-zone svg{width:36px;height:36px;fill:var(--text-muted);margin:0 auto 10px}
.drop-zone p{color:var(--text-dim);font-size:14px;margin-bottom:8px}
.drop-btn{display:inline-block;padding:8px 20px;background:var(--accent);color:#fff;border-radius:20px;font-size:14px;font-weight:600;cursor:pointer}
.url-row{display:flex;gap:8px;margin-bottom:24px}
.url-row input{flex:1;background:var(--surface);border:1.5px solid var(--elevated);border-radius:12px;padding:10px 14px;font-size:14px}
.url-row input:focus{border-color:var(--accent)}
.url-row button{padding:10px 18px;background:var(--accent);color:#fff;border-radius:12px;font-size:14px;font-weight:600;white-space:nowrap}
.pl-section-title{font-size:13px;font-weight:600;color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.pl-list{display:flex;flex-direction:column;gap:8px}
.pl-card{background:var(--surface);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid rgba(255,255,255,.05)}
.pl-card:active{background:var(--elevated)}
.pl-card-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pl-card-icon svg{width:20px;height:20px;fill:#fff}
.pl-card-info{flex:1;min-width:0}
.pl-card-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pl-card-meta{font-size:12px;color:var(--text-dim);margin-top:2px}
.pl-card-del{padding:8px;color:var(--text-muted)}
.pl-empty{text-align:center;padding:32px 0;color:var(--text-muted);font-size:14px}

/* ── BROWSE SCREEN ── */
#browse-screen{position:fixed;inset:0;background:var(--bg);z-index:10;display:none;flex-direction:column;overflow:hidden}
#browse-screen.active{display:flex}
#browse-topbar{position:absolute;top:0;left:0;right:0;z-index:20;padding:calc(10px + var(--safe-top)) 16px 10px;display:flex;align-items:center;gap:10px;background:linear-gradient(to bottom,rgba(11,11,16,.95) 0%,transparent 100%)}
#browse-back-btn,#browse-search-btn{padding:6px;color:var(--text-dim)}
#browse-back-btn svg,#browse-search-btn svg{width:22px;height:22px}
#browse-title{flex:1;font-size:17px;font-weight:700}
#browse-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
#browse-scroll::-webkit-scrollbar{display:none}

/* Hero */
#browse-hero{position:relative;width:100%;height:56vw;max-height:320px;min-height:200px;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:blur(2px) brightness(.55);transform:scale(1.05)}
.hero-gradient{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(11,11,16,0) 25%,var(--bg) 100%)}
.hero-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:0 24px 40px}
.hero-logo-img{width:90px;height:56px;object-fit:contain;filter:drop-shadow(0 2px 12px rgba(0,0,0,.8))}
.hero-logo-init{width:72px;height:72px;border-radius:14px;background:var(--elevated);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800}
.hero-ch-name{font-size:20px;font-weight:800;text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.8);max-width:260px}
.hero-ch-sub{font-size:12px;color:var(--text-dim);text-align:center}
.hero-btns{position:absolute;bottom:12px;left:0;right:0;display:flex;gap:10px;justify-content:center;padding:0 20px}
.hero-btn{display:flex;align-items:center;gap:6px;padding:10px 20px;border-radius:24px;font-size:14px;font-weight:700}
.hero-btn-play{background:var(--text);color:#0B0B10}
.hero-btn-play svg{fill:#0B0B10}
.hero-btn-fav{background:rgba(255,255,255,.15);color:var(--text);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.2)}
.hero-btn svg{width:18px;height:18px}

/* Rows */
.browse-rows{padding:0 0 calc(24px + var(--safe-bot))}
.browse-row{margin-bottom:4px}
.browse-row-header{display:flex;align-items:center;justify-content:space-between;padding:16px 16px 8px}
.browse-row-title{font-size:15px;font-weight:700}
.browse-row-all{font-size:13px;color:var(--accent);font-weight:600}
.browse-row-scroll{overflow-x:auto;display:flex;gap:10px;padding:0 16px 8px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.browse-row-scroll::-webkit-scrollbar{display:none}

/* Channel card */
.ch-card{flex-shrink:0;width:var(--card-w);scroll-snap-align:start;border-radius:10px;overflow:hidden;background:var(--surface);position:relative;cursor:pointer;border:1px solid rgba(255,255,255,.06)}
.ch-card:active{opacity:.8}
.ch-card-thumb{width:100%;height:var(--card-h);background:var(--elevated);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.ch-card-thumb img{width:70%;height:70%;object-fit:contain}
.ch-card-thumb .ch-init{font-size:18px;font-weight:800;color:var(--text-dim)}
.ch-card-play{position:absolute;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;opacity:0}
.ch-card:active .ch-card-play{opacity:1}
.ch-card-play svg{width:28px;height:28px;fill:#fff}
.ch-card-info{padding:7px 9px 9px}
.ch-card-name{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-card-group{font-size:11px;color:var(--text-dim);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-dot{position:absolute;top:5px;right:5px;width:22px;height:22px;background:rgba(0,0,0,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.fav-dot svg{width:13px;height:13px;fill:var(--text-muted)}
.fav-dot.faved svg{fill:var(--warn)}
.q-badge{font-size:9px;font-weight:700;background:var(--accent);color:#fff;padding:1px 5px;border-radius:4px;position:absolute;bottom:5px;left:5px}

/* ── CATEGORY SCREEN ── */
#cat-screen{position:fixed;inset:0;background:var(--bg);z-index:30;display:none;flex-direction:column}
#cat-screen.active{display:flex}
#cat-topbar{padding:calc(12px + var(--safe-top)) 16px 12px;display:flex;align-items:center;gap:10px;background:var(--surface);border-bottom:1px solid rgba(255,255,255,.06)}
#cat-back-btn{padding:6px;color:var(--text-dim)}
#cat-back-btn svg{width:22px;height:22px}
#cat-title{flex:1;font-size:17px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#cat-count{font-size:13px;color:var(--text-dim)}
#cat-list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 12px calc(12px + var(--safe-bot));display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
#cat-list::-webkit-scrollbar{display:none}
.cat-card{background:var(--surface);border-radius:12px;overflow:hidden;cursor:pointer;border:1px solid rgba(255,255,255,.05)}
.cat-card:active{opacity:.8}
.cat-card-thumb{width:100%;aspect-ratio:16/9;background:var(--elevated);display:flex;align-items:center;justify-content:center;position:relative}
.cat-card-thumb img{width:65%;height:65%;object-fit:contain}
.cat-card-thumb .cat-init{font-size:18px;font-weight:800;color:var(--text-dim)}
.cat-card-info{padding:8px 10px 10px}
.cat-card-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cat-card-group{font-size:11px;color:var(--text-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── SEARCH OVERLAY ── */
#search-overlay{position:fixed;inset:0;background:rgba(11,11,16,.97);z-index:50;display:none;flex-direction:column}
#search-overlay.active{display:flex}
#search-bar{padding:calc(12px + var(--safe-top)) 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06)}
#search-bar svg{width:20px;height:20px;fill:var(--text-dim);flex-shrink:0}
#search-input{flex:1;font-size:16px}
#search-input::placeholder{color:var(--text-muted)}
#search-cancel{padding:6px 2px;color:var(--accent);font-size:14px;font-weight:600}
#search-results{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:4px 0 calc(8px + var(--safe-bot))}
#search-results::-webkit-scrollbar{display:none}
.search-empty{padding:40px 20px;text-align:center;color:var(--text-muted);font-size:14px}
.ch-row{display:flex;align-items:center;gap:12px;padding:10px 16px;cursor:pointer}
.ch-row:active{background:rgba(255,255,255,.04)}
.ch-row-logo{width:44px;height:44px;border-radius:10px;background:var(--elevated);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.ch-row-logo img{width:100%;height:100%;object-fit:contain}
.ch-row-logo .ch-init{font-size:16px;font-weight:700;color:var(--text-dim)}
.ch-row-info{flex:1;min-width:0}
.ch-row-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch-row-group{font-size:12px;color:var(--text-dim);margin-top:2px}
.ch-row-fav{padding:8px;color:var(--text-muted)}
.ch-row-fav.faved{color:var(--warn)}
.ch-row-fav svg{width:18px;height:18px}

/* ── PLAYER SCREEN ── */
#player-screen{position:fixed;inset:0;background:#000;z-index:200;display:none;flex-direction:column}
#player-screen.active{display:flex}
#pv{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000}
#p-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;transition:opacity .3s}
#p-overlay.hidden{opacity:0;pointer-events:none}
#p-top{padding:calc(12px + var(--safe-top)) 16px 12px;background:linear-gradient(to bottom,rgba(0,0,0,.8) 0%,transparent 100%);display:flex;align-items:center;gap:10px}
#p-back-btn{padding:8px;color:#fff}
#p-back-btn svg{width:24px;height:24px;fill:#fff}
#p-ch-info{flex:1;min-width:0}
#p-ch-name{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#p-ch-group{font-size:12px;color:rgba(255,255,255,.6);margin-top:2px}
#p-top-actions{display:flex;gap:4px}
#p-fav-btn,#p-info-btn{padding:8px;color:rgba(255,255,255,.8)}
#p-fav-btn svg,#p-info-btn svg{width:22px;height:22px;fill:rgba(255,255,255,.8)}
#p-fav-btn.faved svg{fill:var(--warn)}
#p-mid{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:20px}
#p-prev-btn,#p-next-btn{width:48px;height:48px;background:rgba(255,255,255,.12);border-radius:50%;display:flex;align-items:center;justify-content:center}
#p-prev-btn svg,#p-next-btn svg{width:24px;height:24px;fill:#fff}
#p-play-btn{width:64px;height:64px;background:rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;justify-content:center}
#p-play-btn svg{width:36px;height:36px;fill:#fff}
#p-bottom{padding:12px 16px calc(12px + var(--safe-bot));background:linear-gradient(to top,rgba(0,0,0,.8) 0%,transparent 100%);display:flex;align-items:center;justify-content:space-between}
#p-pos{font-size:12px;color:rgba(255,255,255,.6)}
.p-bottom-right{display:flex;align-items:center;gap:4px}
#p-mute-btn,#p-fs-btn{padding:8px}
#p-mute-btn svg,#p-fs-btn svg{width:22px;height:22px;fill:rgba(255,255,255,.8)}
#p-loading{position:absolute;inset:0;background:rgba(0,0,0,.6);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#p-loading.show{display:flex}
.p-spinner{width:44px;height:44px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#p-loading-name{font-size:14px;color:rgba(255,255,255,.8);max-width:220px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#p-error{position:absolute;inset:0;background:rgba(0,0,0,.85);display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;text-align:center}
#p-error.show{display:flex}
#p-error>svg{width:40px;height:40px;fill:var(--danger)}
#p-err-msg{font-size:14px;color:rgba(255,255,255,.8);max-width:280px;white-space:pre-line;line-height:1.5}
.p-err-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.p-err-btn{padding:9px 16px;border-radius:20px;font-size:13px;font-weight:600;background:var(--elevated);border:1px solid rgba(255,255,255,.12)}
#p-retry-btn{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── BOTTOM SHEET ── */
#bs-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:400;display:none}
#bs-overlay.show{display:block}
#bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--elevated);border-radius:20px 20px 0 0;z-index:401;padding:0 0 calc(20px + var(--safe-bot));transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1)}
#bottom-sheet.open{transform:translateY(0)}
.bs-drag{width:36px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:12px auto 16px}
#bs-head{display:flex;align-items:center;gap:14px;padding:0 16px 16px}
#bs-logo{width:52px;height:52px;border-radius:12px;background:var(--surface);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#bs-logo img{width:100%;height:100%;object-fit:contain}
.bs-logo-init{font-size:18px;font-weight:800;color:var(--text-dim)}
#bs-meta{flex:1;min-width:0}
#bs-title{font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#bs-group{font-size:12px;color:var(--text-dim);margin-top:2px}
#bs-url{font-size:10px;color:var(--text-muted);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bs-actions{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid rgba(255,255,255,.06);margin-top:4px}
.bs-btn{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;font-size:11px;color:var(--text-dim);cursor:pointer}
.bs-btn:active{background:rgba(255,255,255,.05)}
.bs-btn svg{width:22px;height:22px}
#bs-fav.faved svg{fill:var(--warn);color:var(--warn)}
</style>
</head>
<body>
<div id="progress"></div>
<div id="toast"></div>

<!-- LOAD SCREEN -->
<div id="load-screen">
  <div class="load-logo">
    <div class="load-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 1.99-.9 1.99-2L23 5c0-1.1-.9-2-2-2zm0 14H3V5h18v12zm-5-6l-7 4V7z"/></svg>
    </div>
    <div class="load-logo-text">M3U <span>Player</span></div>
  </div>
  <div class="drop-zone" id="drop-zone">
    <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 10l-4-4h2.5V9h3v3H18l-4 4z"/></svg>
    <p>M3U dosyasını buraya sürükleyin</p>
    <label class="drop-btn" for="file-input">Dosya Seç</label>
    <input type="file" id="file-input" accept=".m3u,.m3u8,.txt" style="display:none">
  </div>
  <div class="url-row">
    <input id="url-input" type="url" placeholder="https://... playlist URL" inputmode="url">
    <button id="url-load-btn">Yükle</button>
  </div>
  <div class="pl-section-title">Kayıtlı Listeler</div>
  <div class="pl-list" id="pl-list"></div>
</div>

<!-- BROWSE SCREEN -->
<div id="browse-screen">
  <div id="browse-topbar">
    <button id="browse-back-btn"><svg viewBox="0 0 24 24"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg></button>
    <span id="browse-title">Kanallar</span>
    <button id="browse-search-btn"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></button>
  </div>
  <div id="browse-scroll">
    <div id="browse-hero">
      <div class="hero-bg" id="hero-bg"></div>
      <div class="hero-gradient"></div>
      <div class="hero-content">
        <div id="hero-logo"></div>
        <div id="hero-title" class="hero-ch-name"></div>
        <div id="hero-sub" class="hero-ch-sub"></div>
      </div>
      <div class="hero-btns">
        <button class="hero-btn hero-btn-play" id="hero-play-btn">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>İzle
        </button>
        <button class="hero-btn hero-btn-fav" id="hero-fav-btn">
          <svg viewBox="0 0 24 24" id="hero-fav-ico"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
          <span id="hero-fav-label">Favori</span>
        </button>
      </div>
    </div>
    <div id="browse-rows" class="browse-rows"></div>
  </div>
</div>

  </div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<script>
'use strict';
const S={
  get:(k,d)=>{try{const v=localStorage.getItem('m3u_'+k);return v?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem('m3u_'+k,JSON.stringify(v));}catch(e){if(e.name==='QuotaExceededError')localStorage.removeItem('m3u_chs');}},
  del:(k)=>{try{localStorage.removeItem('m3u_'+k);}catch{}}
};

let ALL=[],SEL=null,PLAY_IDX=0,CAT_CHS=[];
let hlsInstance=null,wakeLock=null,overlayTimer=null;
let FAVS=new Set(S.get('favs',[]));
let RECENT=S.get('recent',[]);
let PLAYLISTS=S.get('pl_list',[]);
let HERO_CH=null;
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function numFmt(n){return n.toLocaleString('tr-TR');}
function ago(ts){const s=Math.floor((Date.now()-ts)/1000);if(s<60)return 'az önce';if(s<3600)return Math.floor(s/60)+' dk';if(s<86400)return Math.floor(s/3600)+' sa';return Math.floor(s/86400)+' gün';}
function initials(n){return n.replace(/[^A-Za-z0-9ÇĞİÖŞÜçğışöşü]/g,'').slice(0,2).toUpperCase()||'??';}
function detectQuality(n){const u=n.toUpperCase();if(u.includes('4K')||u.includes('UHD'))return '4K';if(u.includes('FHD')||u.includes('1080'))return 'FHD';if(u.includes(' HD')||u.includes('720'))return 'HD';return null;}
function setP(p){const b=document.getElementById('progress');b.style.width=p+'%';b.style.opacity='1';if(p>=100)setTimeout(()=>{b.style.opacity='0';setTimeout(()=>b.style.width='0',500);},400);}
let toastT;
function showToast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='show '+type;clearTimeout(toastT);toastT=setTimeout(()=>t.className='',2500);}

function parseM3U(text){
  const lines=text.split('\n'),chs=[];let cur={};let id=0;
  for(const line of lines){
    const l=line.trim();if(!l)continue;
    if(l.startsWith('#EXTINF')){
      const lm=l.match(/tvg-logo="([^"]*)"/i),gm=l.match(/group-title="([^"]*)"/i),nm=l.match(/,(.+)$/);
      cur={l:lm?lm[1].trim():'',g:gm?gm[1].trim():'Genel',n:nm?nm[1].trim():'Kanal'};
    } else if(!l.startsWith('#')){
      if(!cur.n)cur={n:'Kanal',g:'Genel',l:''};
      chs.push({id:id++,...cur,u:l});cur={};
    }
  }
  return chs;
}

function autoSavePL(source,channels){
  let pls=S.get('pl_list',[]);
  const existing=pls.findIndex(p=>p.id===source.id||(p.url&&p.url===source.url));
  const entry={id:source.id||Date.now().toString(36),name:source.name,type:source.type,url:source.url||null,ts:Date.now(),count:channels.length};
  if(existing>=0){pls[existing]={...pls[existing],...entry};}
  else{if(pls.length>=10){const old=pls.reduce((a,b)=>a.ts<b.ts?a:b);S.del('pl_'+old.id);pls=pls.filter(p=>p.id!==old.id);}pls.push(entry);}
  S.set('pl_list',pls);
  try{S.set('pl_'+entry.id,channels.map(c=>({n:c.n,g:c.g,l:c.l,u:c.u})));}catch{}
  PLAYLISTS=pls;return entry.id;
}
function deletePL(id){PLAYLISTS=PLAYLISTS.filter(p=>p.id!==id);S.set('pl_list',PLAYLISTS);S.del('pl_'+id);renderPLList();}

function renderPLList(){
  const el=document.getElementById('pl-list');
  if(!PLAYLISTS.length){el.innerHTML='<div class="pl-empty">Henüz kayıtlı liste yok</div>';return;}
  el.innerHTML=PLAYLISTS.slice().sort((a,b)=>b.ts-a.ts).map(pl=>`
    <div class="pl-card" data-id="${esc(pl.id)}">
      <div class="pl-card-icon"><svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-1 9H9V9h10v2zm-4 4H9v-2h6v2zm4-8H9V5h10v2z"/></svg></div>
      <div class="pl-card-info"><div class="pl-card-name">${esc(pl.name)}</div><div class="pl-card-meta">${numFmt(pl.count)} kanal · ${ago(pl.ts)}</div></div>
      <button class="pl-card-del" data-del="${esc(pl.id)}"><svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
    </div>`).join('');
  el.querySelectorAll('.pl-card').forEach(card=>{
    card.addEventListener('click',e=>{if(!e.target.closest('[data-del]'))loadPlaylist(card.dataset.id);});
    card.querySelector('[data-del]')?.addEventListener('click',e=>{e.stopPropagation();deletePL(card.dataset.id);});
  });
}

function loadPlaylist(id){
  const pl=PLAYLISTS.find(p=>p.id===id);if(!pl)return;
  setP(15);
  if(pl.type==='url'&&pl.url){
    loadURL(pl.url,pl).catch(()=>{
      const chs=S.get('pl_'+id,null);
      if(chs?.length){initApp(chs.map((c,i)=>({id:i,...c})),pl);}else{setP(0);showToast('Liste yüklenemedi','err');}
    });
  } else {
    const chs=S.get('pl_'+id,null);
    if(chs?.length){setP(80);setTimeout(()=>initApp(chs.map((c,i)=>({id:i,...c})),pl),40);}
    else{setP(0);showToast('Kaydedilmiş kanal bulunamadı','err');}
  }
}

function addRecent(ch){RECENT=RECENT.filter(r=>r.u!==ch.u);RECENT.unshift({n:ch.n,g:ch.g,l:ch.l,u:ch.u,ts:Date.now()});if(RECENT.length>30)RECENT=RECENT.slice(0,30);S.set('recent',RECENT);}

function initApp(channels,source){
  ALL=channels;
  if(source)autoSavePL(source,ALL);
  try{S.set('chs',ALL.map(c=>({n:c.n,g:c.g,l:c.l,u:c.u})));S.set('src',source);}catch{}
  document.getElementById('load-screen').classList.add('hidden');
  document.getElementById('browse-screen').classList.add('active');
  renderBrowse();setP(100);
}

// ── BROWSE ──
function renderBrowse(){
  if(!ALL.length)return;
  const withLogo=ALL.filter(c=>c.l);
  HERO_CH=withLogo.length?withLogo[Math.floor(Math.random()*Math.min(withLogo.length,50))]:ALL[0];
  renderHero(HERO_CH);
  const rows=document.getElementById('browse-rows');rows.innerHTML='';
  const favChs=ALL.filter(c=>FAVS.has(c.u));
  if(favChs.length)rows.appendChild(buildRow('⭐ Favorilerim',favChs,'__favs__'));
  if(RECENT.length){
    const rChs=RECENT.map(r=>ALL.find(c=>c.u===r.u)).filter(Boolean).slice(0,20);
    if(rChs.length)rows.appendChild(buildRow('🕐 Son İzlenenler',rChs,'__recent__'));
  }
  getCats().forEach(cat=>rows.appendChild(buildRow(cat,ALL.filter(c=>c.g===cat),cat)));
}

function getCats(){const s=new Set(),r=[];ALL.forEach(c=>{if(!s.has(c.g)){s.add(c.g);r.push(c.g);}});return r;}

function renderHero(ch){
  const bg=document.getElementById('hero-bg');
  if(ch.l){bg.style.backgroundImage=`url(${ch.l})`;}else{bg.style.backgroundImage='none';bg.style.background='linear-gradient(135deg,#1A1A40,#0B0B10)';}
  const logoEl=document.getElementById('hero-logo');
  const init=initials(ch.n);
  logoEl.innerHTML=ch.l
    ?`<img class="hero-logo-img" src="${esc(ch.l)}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="hero-logo-init" style="display:none">${esc(init)}</div>`
    :`<div class="hero-logo-init">${esc(init)}</div>`;
  document.getElementById('hero-title').textContent=ch.n;
  const q=detectQuality(ch.n);
  document.getElementById('hero-sub').textContent=ch.g+(q?' · '+q:'');
  updateHeroFav(ch);
  document.getElementById('hero-play-btn').onclick=()=>openPlayer(ch,ALL.findIndex(c=>c.u===ch.u));
  document.getElementById('hero-fav-btn').onclick=()=>{toggleFav(ch);updateHeroFav(ch);};
}

function updateHeroFav(ch){
  const faved=FAVS.has(ch.u);
  document.getElementById('hero-fav-ico').style.fill=faved?'var(--warn)':'currentColor';
  document.getElementById('hero-fav-label').textContent=faved?'Kaldır':'Favori';
}

function buildRow(title,channels,catKey){
  const wrap=document.createElement('div');wrap.className='browse-row';
  const MAX=20,shown=channels.slice(0,MAX),hasMore=channels.length>MAX;
  wrap.innerHTML=`
    <div class="browse-row-header">
      <span class="browse-row-title">${esc(title)}</span>
      ${hasMore||!['__favs__','__recent__'].includes(catKey)?`<span class="browse-row-all">${numFmt(channels.length)} · Tümü ›</span>`:''}
    </div>
    <div class="browse-row-scroll">${shown.map((ch,i)=>buildCard(ch,i)).join('')}</div>`;
  wrap.querySelectorAll('.ch-card').forEach((card,i)=>{
    const ch=shown[i];if(!ch)return;
    card.addEventListener('click',e=>{if(e.target.closest('.fav-dot'))return;openPlayer(ch,ALL.findIndex(c=>c.u===ch.u));});
    card.querySelector('.fav-dot')?.addEventListener('click',e=>{e.stopPropagation();toggleFav(ch,card.querySelector('.fav-dot'));});
  });
  wrap.querySelector('.browse-row-all')?.addEventListener('click',()=>openCatScreen(catKey,channels,title));
  return wrap;
}

function buildCard(ch,idx){
  const q=detectQuality(ch.n),faved=FAVS.has(ch.u),init=initials(ch.n);
  const logo=ch.l?`<img src="${esc(ch.l)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="ch-init" style="display:none">${esc(init)}</div>`:`<div class="ch-init">${esc(init)}</div>`;
  return `<div class="ch-card">
    <div class="ch-card-thumb">${logo}<div class="ch-card-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>${q?`<span class="q-badge">${q}</span>`:''}</div>
    <div class="ch-card-info"><div class="ch-card-name">${esc(ch.n)}</div><div class="ch-card-group">${esc(ch.g)}</div></div>
    <div class="fav-dot${faved?' faved':''}"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></div>
  </div>`;
}

// ── CATEGORY SCREEN ──
function openCatScreen(catKey,channels,title){
  CAT_CHS=channels;
  document.getElementById('cat-title').textContent=title;
  document.getElementById('cat-count').textContent=numFmt(channels.length)+' kanal';
  document.getElementById('cat-screen').classList.add('active');
  const el=document.getElementById('cat-list');
  el.innerHTML=channels.map((ch,i)=>{
    const q=detectQuality(ch.n),init=initials(ch.n);
    const logo=ch.l?`<img src="${esc(ch.l)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="cat-init" style="display:none">${esc(init)}</div>`:`<div class="cat-init">${esc(init)}</div>`;
    return `<div class="cat-card" data-idx="${i}"><div class="cat-card-thumb">${logo}${q?`<span class="q-badge">${q}</span>`:''}</div><div class="cat-card-info"><div class="cat-card-name">${esc(ch.n)}</div><div class="cat-card-group">${esc(ch.g)}</div></div></div>`;
  }).join('');
  el.querySelectorAll('.cat-card').forEach(card=>{
    const ch=channels[parseInt(card.dataset.idx)];if(!ch)return;
    card.addEventListener('click',()=>openPlayer(ch,ALL.findIndex(c=>c.u===ch.u)));
  });
}

// ── SEARCH ──
function openSearch(){document.getElementById('search-overlay').classList.add('active');setTimeout(()=>document.getElementById('search-input').focus(),50);}
function closeSearch(){document.getElementById('search-overlay').classList.remove('active');document.getElementById('search-input').value='';document.getElementById('search-results').innerHTML='';}
let searchT;
function doSearch(q){
  const el=document.getElementById('search-results');
  if(!q.trim()){el.innerHTML='';return;}
  const ql=q.toLowerCase();
  const results=ALL.filter(c=>c.n.toLowerCase().includes(ql)||c.g.toLowerCase().includes(ql)).slice(0,80);
  if(!results.length){el.innerHTML='<div class="search-empty">Sonuç bulunamadı</div>';return;}
  el.innerHTML=results.map((ch,i)=>{
    const init=initials(ch.n),faved=FAVS.has(ch.u);
    const logo=ch.l?`<img src="${esc(ch.l)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'"><div class="ch-init" style="display:none">${esc(init)}</div>`:`<div class="ch-init">${esc(init)}</div>`;
    return `<div class="ch-row" data-idx="${i}">
      <div class="ch-row-logo">${logo}</div>
      <div class="ch-row-info"><div class="ch-row-name">${esc(ch.n)}</div><div class="ch-row-group">${esc(ch.g)}</div></div>
      <button class="ch-row-fav${faved?' faved':''}"><svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg></button>
    </div>`;
  }).join('');
  el.querySelectorAll('.ch-row').forEach((row,i)=>{
    const ch=results[i];if(!ch)return;
    row.addEventListener('click',e=>{if(e.target.closest('.ch-row-fav'))return;closeSearch();openPlayer(ch,ALL.findIndex(c=>c.u===ch.u));});
    row.querySelector('.ch-row-fav')?.addEventListener('click',e=>{e.stopPropagation();toggleFav(ch,row.querySelector('.ch-row-fav'));});
  });
}

// ── FAVORITES ──
function toggleFav(ch,btnEl){
  if(FAVS.has(ch.u)){FAVS.delete(ch.u);showToast('Favoriden kaldırıldı');if(btnEl)btnEl.classList.remove('faved');}
  else{FAVS.add(ch.u);showToast('⭐ Favorilere eklendi','ok');if(btnEl)btnEl.classList.add('faved');}
  S.set('favs',[...FAVS]);
  updatePlayerFavBtn();
  if(HERO_CH&&HERO_CH.u===ch.u)updateHeroFav(ch);
}

// ── PLAYER ──
function openPlayer(ch,idx){
  SEL=ch;PLAY_IDX=typeof idx==='number'?idx:ALL.findIndex(c=>c.u===ch.u);
  document.getElementById('player-screen').classList.add('active');
  document.body.style.overflow='hidden';
  if(navigator.wakeLock)navigator.wakeLock.request('screen').then(wl=>wakeLock=wl).catch(()=>{});
  playChannel(ch);showOverlay();
}

function closePlayer(){
  const v=document.getElementById('pv');
  v.pause();
  if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
  v.src='';v.load();
  if(wakeLock){wakeLock.release();wakeLock=null;}
  if(document.fullscreenElement)document.exitFullscreen().catch(()=>{});
  else if(document.webkitFullscreenElement)(document.webkitExitFullscreen||function(){}).call(document);
  document.getElementById('player-screen').classList.remove('active');
  document.body.style.overflow='';clearTimeout(overlayTimer);
}

function playChannel(ch){
  const v=document.getElementById('pv');
  document.getElementById('p-ch-name').textContent=ch.n;
  document.getElementById('p-ch-group').textContent=ch.g;
  updatePlayerFavBtn();updatePosLabel();
  showPlayerLoading(true,ch.n);hidePlayerError();
  addRecent(ch);
  if(hlsInstance){hlsInstance.destroy();hlsInstance=null;}
  v.src='';

  const onHTTPS=location.protocol==='https:';
  let url=ch.u;
  if(onHTTPS&&url.startsWith('http://'))url='https://'+url.slice(7);

  function tryHLS(srcUrl){
    if(typeof Hls==='undefined'||!Hls.isSupported()){tryNative(srcUrl);return;}
    hlsInstance=new Hls({enableWorker:true,lowLatencyMode:true,maxBufferLength:30,maxMaxBufferLength:60,fragLoadingTimeOut:15000,manifestLoadingTimeOut:15000});
    hlsInstance.loadSource(srcUrl);
    hlsInstance.attachMedia(v);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED,()=>{showPlayerLoading(false);v.play().catch(e=>showPlayerError('Oynatma başlatılamadı.\n'+e.message));});
    hlsInstance.on(Hls.Events.ERROR,(evt,data)=>{
      if(!data.fatal)return;
      if(data.type===Hls.ErrorTypes.MEDIA_ERROR){hlsInstance.recoverMediaError();return;}
      if(onHTTPS&&ch.u.startsWith('http://')&&data.type===Hls.ErrorTypes.NETWORK_ERROR){
        showPlayerError('Bu yayın HTTP protokolü kullanıyor.\nHTTPS sayfasında doğrudan oynatılamaz.\n\nVLC veya harici uygulama kullanabilirsiniz.');
      } else {
        tryNative(srcUrl);
      }
    });
  }

  function tryNative(srcUrl){
    v.src=srcUrl;v.load();
    v.play().then(()=>showPlayerLoading(false)).catch(e=>{
      if(onHTTPS&&ch.u.startsWith('http://')){
        showPlayerError('Bu yayın HTTP protokolü kullanıyor.\nHTTPS sayfasında oynatılamaz.\n\nVLC ile açabilirsiniz.');
      } else {
        showPlayerError('Oynatma hatası:\n'+e.message);
      }
    });
  }

  // Always try HLS.js first (works for Xtream Codes and m3u8 alike)
  if(typeof Hls!=='undefined'&&Hls.isSupported()){
    tryHLS(url);
  } else if(v.canPlayType('application/vnd.apple.mpegurl')){
    tryNative(url);
  } else {
    tryNative(url);
  }
}

function showPlayerLoading(show,name){
  document.getElementById('p-loading').classList.toggle('show',show);
  if(name)document.getElementById('p-loading-name').textContent=name;
}
function hidePlayerError(){document.getElementById('p-error').classList.remove('show');}
function showPlayerError(msg){showPlayerLoading(false);document.getElementById('p-err-msg').textContent=msg||'Bilinmeyen hata';document.getElementById('p-error').classList.add('show');}
function updatePlayerFavBtn(){const btn=document.getElementById('p-fav-btn');if(btn&&SEL)btn.classList.toggle('faved',FAVS.has(SEL.u));}
function updatePosLabel(){const el=document.getElementById('p-pos');if(el&&PLAY_IDX>=0)el.textContent=(PLAY_IDX+1)+' / '+ALL.length;}
function nextChannel(){const idx=(PLAY_IDX+1)%ALL.length;SEL=ALL[idx];PLAY_IDX=idx;playChannel(SEL);showOverlay();}
function prevChannel(){const idx=(PLAY_IDX-1+ALL.length)%ALL.length;SEL=ALL[idx];PLAY_IDX=idx;playChannel(SEL);showOverlay();}

function showOverlay(){
  const ov=document.getElementById('p-overlay');ov.classList.remove('hidden');clearTimeout(overlayTimer);
  if(!document.getElementById('pv').paused)overlayTimer=setTimeout(()=>ov.classList.add('hidden'),4000);
}
function toggleOverlay(){const ov=document.getElementById('p-overlay');if(ov.classList.contains('hidden'))showOverlay();else{clearTimeout(overlayTimer);ov.classList.add('hidden');}}
function updatePlayBtn(){const v=document.getElementById('pv'),ico=document.getElementById('p-play-ico');if(ico)ico.innerHTML=v.paused?'<path d="M8 5v14l11-7z"/>':'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';}
function updateMuteBtn(){
  const v=document.getElementById('pv'),ico=document.getElementById('p-mute-ico');if(!ico)return;
  ico.innerHTML=v.muted||v.volume===0
    ?'<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>'
    :'<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
}
function toggleFS(){
  const ps=document.getElementById('player-screen');
  if(!document.fullscreenElement&&!document.webkitFullscreenElement)(ps.requestFullscreen||ps.webkitRequestFullscreen).call(ps).catch(()=>{});
  else(document.exitFullscreen||document.webkitExitFullscreen).call(document).catch(()=>{});
}
function updateFSBtn(){
  const ico=document.getElementById('p-fs-ico');if(!ico)return;
  ico.innerHTML=document.fullscreenElement||document.webkitFullscreenElement
    ?'<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>'
    :'<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';
}

// ── BOTTOM SHEET ──
function openSheet(ch){
  SEL=ch;
  const init=initials(ch.n),logoEl=document.getElementById('bs-logo');
  logoEl.innerHTML=ch.l?`<img src="${esc(ch.l)}" style="width:100%;height:100%;object-fit:contain" onerror="this.style.display='none'"><div class="bs-logo-init" style="display:none">${esc(init)}</div>`:`<div class="bs-logo-init">${esc(init)}</div>`;
  document.getElementById('bs-title').textContent=ch.n;
  document.getElementById('bs-group').textContent=ch.g;
  document.getElementById('bs-url').textContent=ch.u;
  const faved=FAVS.has(ch.u);
  document.getElementById('bs-fav-label').textContent=faved?'Kaldır':'Favori';
  document.getElementById('bs-fav').classList.toggle('faved',faved);
  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('bs-overlay').classList.add('show');
}
function closeSheet(){document.getElementById('bottom-sheet').classList.remove('open');document.getElementById('bs-overlay').classList.remove('show');}

function openVLC(ch){
  const url=isIOS?'vlc-x-callback://x-callback-url/stream?url='+encodeURIComponent(ch.u):'vlc://'+ch.u;
  const a=document.createElement('a');a.href=url;a.style.display='none';document.body.appendChild(a);a.click();a.remove();
  showToast('VLC açılıyor…');
}
function copyLink(ch){
  const t=ch.u;
  if(navigator.clipboard?.writeText)navigator.clipboard.writeText(t).then(()=>showToast('✓ Kopyalandı','ok')).catch(()=>fbCopy(t));
  else fbCopy(t);
}
function fbCopy(t){const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;top:0;left:0;opacity:0;font-size:16px;';document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,99999);try{document.execCommand('copy');showToast('✓ Kopyalandı','ok');}catch{showToast('Kopyalanamadı');}ta.remove();}

function loadText(text,source){
  setP(35);setTimeout(()=>{
    const chs=parseM3U(text);setP(80);
    if(!chs.length){showToast('M3U içinde kanal bulunamadı');setP(0);return;}
    setTimeout(()=>initApp(chs,source),60);
  },40);
}

async function loadURL(url,existingPL){
  url=url.trim();if(!url.startsWith('http')){showToast('Geçerli bir URL girin');return;}
  setP(15);
  const proxies=[`https://corsproxy.io/?${encodeURIComponent(url)}`,`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`];
  for(const proxy of proxies){
    try{
      const res=await fetch(proxy,{signal:AbortSignal.timeout?AbortSignal.timeout(12000):undefined});
      if(res.ok){setP(65);const src=existingPL||{type:'url',url,name:url.split('/').pop()||url,ts:Date.now()};loadText(await res.text(),src);return;}
    }catch{}
  }
  setP(0);showToast('URL yüklenemedi','err');
}

// ── EVENT BINDINGS ──
const dropZone=document.getElementById('drop-zone');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f)readFile(f);});
document.getElementById('file-input').addEventListener('change',e=>{const f=e.target.files[0];if(f)readFile(f);e.target.value='';});
function readFile(f){setP(20);const r=new FileReader();r.onload=e=>loadText(e.target.result,{type:'file',name:f.name,ts:Date.now()});r.onerror=()=>showToast('Dosya okunamadı','err');r.readAsText(f,'utf-8');}
document.getElementById('url-load-btn').addEventListener('click',()=>loadURL(document.getElementById('url-input').value));
document.getElementById('url-input').addEventListener('keydown',e=>{if(e.key==='Enter'){e.target.blur();loadURL(e.target.value);}});

document.getElementById('browse-back-btn').addEventListener('click',()=>{
  document.getElementById('browse-screen').classList.remove('active');
  document.getElementById('load-screen').classList.remove('hidden');
  ALL=[];renderPLList();
});
document.getElementById('browse-search-btn').addEventListener('click',openSearch);
document.getElementById('cat-back-btn').addEventListener('click',()=>document.getElementById('cat-screen').classList.remove('active'));
document.getElementById('search-cancel').addEventListener('click',closeSearch);
document.getElementById('search-input').addEventListener('input',e=>{clearTimeout(searchT);searchT=setTimeout(()=>doSearch(e.target.value),180);});

const pScreen=document.getElementById('player-screen'),pvEl=document.getElementById('pv');
pScreen.addEventListener('click',e=>{if(e.target===pScreen||e.target===pvEl)toggleOverlay();});
pScreen.addEventListener('touchstart',()=>showOverlay(),{passive:true});
document.getElementById('p-back-btn').addEventListener('click',closePlayer);
document.getElementById('p-play-btn').addEventListener('click',()=>{const v=pvEl;v.paused?v.play().catch(()=>{}):v.pause();showOverlay();});
document.getElementById('p-mute-btn').addEventListener('click',()=>{pvEl.muted=!pvEl.muted;updateMuteBtn();showOverlay();});
document.getElementById('p-fs-btn').addEventListener('click',()=>{toggleFS();showOverlay();});
document.getElementById('p-fav-btn').addEventListener('click',()=>{if(SEL){toggleFav(SEL);showOverlay();}});
document.getElementById('p-info-btn').addEventListener('click',()=>{if(SEL){openSheet(SEL);showOverlay();}});
document.getElementById('p-prev-btn').addEventListener('click',prevChannel);
document.getElementById('p-next-btn').addEventListener('click',nextChannel);
pvEl.addEventListener('play',()=>{updatePlayBtn();showPlayerLoading(false);});
pvEl.addEventListener('pause',updatePlayBtn);
pvEl.addEventListener('waiting',()=>showPlayerLoading(true));
pvEl.addEventListener('canplay',()=>showPlayerLoading(false));
pvEl.addEventListener('error',()=>{
  if(pvEl.error&&!document.getElementById('p-error').classList.contains('show')){
    const onHTTPS=location.protocol==='https:';
    if(onHTTPS&&SEL?.u?.startsWith('http://'))showPlayerError('Bu yayın HTTP protokolü kullanıyor.\nHTTPS sayfasında oynatılamaz.\n\nVLC ile açabilirsiniz.');
    else showPlayerError('Video hatası: kod '+pvEl.error.code);
  }
});
document.getElementById('p-retry-btn').addEventListener('click',()=>{if(SEL){hidePlayerError();playChannel(SEL);}});
document.getElementById('p-err-vlc').addEventListener('click',()=>{if(SEL)openVLC(SEL);});
document.getElementById('p-err-copy').addEventListener('click',()=>{if(SEL)copyLink(SEL);});
document.addEventListener('fullscreenchange',updateFSBtn);
document.addEventListener('webkitfullscreenchange',updateFSBtn);
document.addEventListener('keydown',e=>{
  if(!pScreen.classList.contains('active'))return;
  const v=pvEl;
  switch(e.key){
    case 'Escape':closePlayer();break;
    case ' ':case 'k':e.preventDefault();v.paused?v.play().catch(()=>{}):v.pause();showOverlay();break;
    case 'm':v.muted=!v.muted;updateMuteBtn();break;
    case 'f':toggleFS();break;
    case 'ArrowRight':nextChannel();break;
    case 'ArrowLeft':prevChannel();break;
  }
});
let swX=0,swY=0;
pScreen.addEventListener('touchstart',e=>{swX=e.touches[0].clientX;swY=e.touches[0].clientY;},{passive:true});
pScreen.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-swX,dy=e.changedTouches[0].clientY-swY;if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*1.5){dx<0?nextChannel():prevChannel();}},{passive:true});
let bsY=0;
document.getElementById('bottom-sheet').addEventListener('touchstart',e=>{bsY=e.touches[0].clientY;},{passive:true});
document.getElementById('bottom-sheet').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-bsY>60)closeSheet();},{passive:true});
document.getElementById('bs-overlay').addEventListener('click',closeSheet);
document.getElementById('bs-play').addEventListener('click',()=>{if(SEL){const idx=ALL.findIndex(c=>c.u===SEL.u);closeSheet();openPlayer(SEL,idx);}});
document.getElementById('bs-fav').addEventListener('click',()=>{
  if(SEL){toggleFav(SEL,document.getElementById('bs-fav'));document.getElementById('bs-fav-label').textContent=FAVS.has(SEL.u)?'Kaldır':'Favori';}
});
document.getElementById('bs-copy').addEventListener('click',()=>{if(SEL){copyLink(SEL);closeSheet();}});
document.getElementById('bs-vlc').addEventListener('click',()=>{if(SEL){openVLC(SEL);closeSheet();}});

if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));

renderPLList();
</script>
