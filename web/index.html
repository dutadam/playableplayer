<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#2d32ff" />
    <meta name="application-name" content="Playable Player" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Playable Player" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <title>Playable Player</title>
    <style>
      html,
      body,
      #app {
        min-height: 100%;
        margin: 0;
        background: #ffffff;
        color: #10131b;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-screen {
        display: grid;
        min-height: 100svh;
        place-items: center;
        padding: 24px;
        text-align: center;
      }

      .boot-screen strong {
        display: block;
        margin-bottom: 8px;
        font-size: 22px;
      }

      .boot-screen span {
        color: #647084;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <main class="boot-screen">
        <div>
          <strong>Playable Player</strong>
          <span>Opening library...</span>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
