<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <title>Sample Playable</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #101114;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      touch-action: none;
    }
    main {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 35% 25%, rgba(80, 190, 255, .5), transparent 30%),
        linear-gradient(135deg, #11161f, #25313f 55%, #16191f);
    }
    button {
      border: 0;
      border-radius: 18px;
      padding: 18px 26px;
      font-size: 22px;
      font-weight: 700;
      color: #11161f;
      background: #f5d34f;
      box-shadow: 0 14px 35px rgba(0,0,0,.35);
    }
  </style>
</head>
<body>
  <main>
    <button id="button">Tap me: 0</button>
  </main>
  <script>
    let count = 0;
    const button = document.getElementById('button');
    button.addEventListener('click', () => {
      count += 1;
      button.textContent = `Tap me: ${count}`;
    });
  </script>
</body>
</html>
