name: Deploy to m3u-player

on:
  push:
    branches: ['main', 'claude/memory-analysis-tool-design-tm5i3q']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/memory-analysis-tool-design-tm5i3q

      - name: Push index.html to m3u-player
        env:
          PAT: ${{ secrets.M3U_PLAYER_PAT }}
        run: |
          git clone https://x-access-token:${PAT}@github.com/dutadam/m3u-player.git /tmp/m3u-player
          cd /tmp/m3u-player
          cp $GITHUB_WORKSPACE/web/public/iptv/index.html index.html
          sed -i 's|href="../apple-touch-icon.png"|href="./apple-touch-icon.png"|g' index.html
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet && echo "Değişiklik yok" && exit 0
          git commit -m "deploy: index.html güncellendi [skip ci]"
          git push
